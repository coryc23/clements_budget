<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Clements Fam Budget</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet">

<link rel="manifest" href="/manifest.webmanifest">

<style>
  :root {
    --bg: #faf7f2;
    --bg-elev: #ffffff;
    --bg-soft: #f2ede4;
    --ink: #1f1d1a;
    --ink-2: #4a463f;
    --ink-3: #857f74;
    --line: #e9e2d5;
    --line-strong: #d8cfbd;

    --sage:       oklch(0.72 0.09 150);
    --sage-soft:  oklch(0.94 0.04 150);
    --sage-ink:   oklch(0.38 0.07 150);

    --terracotta: oklch(0.72 0.09 40);
    --terra-soft: oklch(0.94 0.04 40);
    --terra-ink:  oklch(0.38 0.07 40);

    --blue:       oklch(0.72 0.09 240);
    --blue-soft:  oklch(0.94 0.04 240);
    --blue-ink:   oklch(0.38 0.07 240);

    --amber:      oklch(0.78 0.09 80);
    --amber-soft: oklch(0.94 0.04 80);
    --amber-ink:  oklch(0.42 0.07 80);

    --plum:       oklch(0.72 0.09 330);
    --plum-soft:  oklch(0.94 0.04 330);
    --plum-ink:   oklch(0.38 0.07 330);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .num { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
  .serif { font-family: 'Fraunces', serif; font-optical-sizing: auto; letter-spacing: -0.01em; }

  button { font-family: inherit; font-size: inherit; color: inherit; cursor: pointer; border: 0; background: none; }
  input, select { font-family: inherit; color: inherit; font-size: inherit; }

  .app { max-width: 1380px; margin: 0 auto; padding: 24px 24px 80px; }

  /* topbar */
  .topbar {
    display: flex; align-items: flex-end; justify-content: space-between; gap: 20px;
    padding-bottom: 16px; border-bottom: 1px solid var(--line); margin-bottom: 24px;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-mark { width: 64px; height: 64px; flex-shrink: 0; }
  .brand-mark svg { width: 100%; height: 100%; display: block; }
  .brand h1 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 22px; margin: 0; letter-spacing: -0.02em; }
  .brand .sub { font-size: 12px; color: var(--ink-3); margin-top: 2px; }

  .month-switch { display: flex; align-items: center; gap: 4px; background: var(--bg-elev); border: 1px solid var(--line); border-radius: 999px; padding: 4px; }
  .month-switch button { width: 28px; height: 28px; border-radius: 999px; color: var(--ink-2); display: inline-flex; align-items: center; justify-content: center; transition: background 0.15s; }
  .month-switch button:hover { background: var(--bg-soft); }
  .month-switch .label { font-weight: 500; padding: 0 10px; min-width: 130px; text-align: center; }

  .view-switch { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .view-switch .seg { display: inline-flex; background: var(--bg-elev); border: 1px solid var(--line); border-radius: 999px; padding: 3px; }
  .view-switch .seg button { padding: 6px 14px; border-radius: 999px; font-size: 12px; font-weight: 500; color: var(--ink-3); transition: all 0.15s; }
  .view-switch .seg button:hover { color: var(--ink-2); }
  .view-switch .seg button.on { background: var(--ink); color: var(--bg); }
  .view-switch select { padding: 7px 12px; border: 1px solid var(--line); border-radius: 999px; background: var(--bg-elev); font-weight: 500; font-size: 13px; color: var(--ink); cursor: pointer; }
  .view-switch select:hover { border-color: var(--line-strong); }
  .view-switch select:focus { outline: none; border-color: var(--ink); box-shadow: 0 0 0 3px var(--blue-soft); }

  .actions { display: flex; gap: 8px; }
  .btn { border: 1px solid var(--line); background: var(--bg-elev); padding: 8px 14px; border-radius: 10px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s; }
  .btn:hover { border-color: var(--line-strong); }
  .btn-primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .btn-primary:hover { background: #000; }
  .btn svg { display: block; }

  /* hero */
  .hero { display: grid; grid-template-columns: 1.3fr 1fr 1fr 1fr; gap: 14px; margin-bottom: 24px; }

  /* Allocation strip */
  .alloc-strip { display: inline-flex; align-items: baseline; gap: 8px; padding: 6px 12px; margin-bottom: 18px; border-radius: 999px; background: var(--bg-soft); border: 1px solid var(--line); font-size: 12px; color: var(--ink-3); }

  /* Fact card */
  .fact-card { display: flex; align-items: flex-start; gap: 14px; padding: 16px 18px; background: linear-gradient(135deg, var(--amber-soft) 0%, var(--bg-elev) 70%); border: 1px solid var(--line); border-radius: 14px; position: relative; }
  .fact-icon { font-size: 28px; flex-shrink: 0; line-height: 1; padding-top: 2px; }
  .fact-body { flex: 1; min-width: 0; }
  .fact-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-3); font-weight: 600; margin-bottom: 4px; }
  .fact-text { font-size: 14px; color: var(--ink); line-height: 1.5; }
  .fact-hint { font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.08em; position: absolute; top: 10px; right: 14px; opacity: 0.6; }
  .alloc-period { text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; font-size: 10px; }
  .alloc-sep { color: var(--ink-3); opacity: 0.5; }
  .alloc-label { color: var(--ink-2); }
  .alloc-amount { font-size: 13px; font-weight: 600; }
  .alloc-amount.ok    { color: var(--sage-ink); }
  .alloc-amount.under { color: var(--amber-ink); }
  .alloc-amount.over  { color: var(--terra-ink); }
  .card { background: var(--bg-elev); border: 1px solid var(--line); border-radius: 16px; padding: 18px; }
  .card.feature { background: linear-gradient(135deg, #fefcf8 0%, var(--bg-elev) 100%); display: flex; flex-direction: column; justify-content: space-between; min-height: 170px; }
  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-3); font-weight: 600; }
  .stat-val { font-family: 'Fraunces', serif; font-weight: 500; letter-spacing: -0.02em; font-size: 36px; line-height: 1.05; margin-top: 6px; }
  .stat-val.small { font-size: 22px; }
  .stat-sub { font-size: 12px; color: var(--ink-3); margin-top: 6px; }
  .pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500; }
  .pill.up { background: var(--sage-soft); color: var(--sage-ink); }
  .pill.down { background: var(--terra-soft); color: var(--terra-ink); }

  .donut-wrap { display: flex; align-items: center; gap: 14px; }
  .donut { width: 110px; height: 110px; flex-shrink: 0; }
  .donut text { font-family: 'Fraunces', serif; fill: var(--ink); }
  .donut .caption { font-family: 'Inter', sans-serif; font-size: 8px; fill: var(--ink-3); letter-spacing: 0.15em; }
  .legend { display: flex; flex-direction: column; gap: 6px; font-size: 12px; }
  .legend-row { display: flex; align-items: center; gap: 8px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  /* tabs */
  .tabs { display: flex; gap: 2px; background: var(--bg-soft); padding: 4px; border-radius: 12px; width: fit-content; margin-bottom: 18px; }
  .tab { padding: 8px 16px; border-radius: 8px; font-weight: 500; color: var(--ink-2); transition: all 0.15s; }
  .tab.active { background: var(--bg-elev); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
  .tab:hover:not(.active) { color: var(--ink); }

  /* table */
  .main-grid { display: grid; grid-template-columns: 1fr 340px; gap: 18px; align-items: start; }
  .table-card { background: var(--bg-elev); border: 1px solid var(--line); border-radius: 16px; overflow: hidden; }
  .table-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--line); }
  .table-head h2 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 17px; margin: 0; letter-spacing: -0.01em; }

  table { width: 100%; border-collapse: collapse; }
  thead th { text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-3); font-weight: 600; padding: 9px 14px; background: var(--bg-soft); border-bottom: 1px solid var(--line); }
  thead th.num { text-align: right; }
  tbody td { padding: 10px 14px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  tbody tr:last-child td { border-bottom: 0; }
  tbody tr:hover td { background: #fdfbf6; }

  .cat-cell { display: flex; align-items: center; gap: 10px; }
  .cat-chip { width: 26px; height: 26px; border-radius: 7px; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
  .cat-name { font-weight: 500; }
  .cat-tag { font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.06em; }

  .editable { background: transparent; border: 1px solid transparent; padding: 3px 6px; border-radius: 6px; text-align: right; width: 90px; transition: all 0.15s; }
  .editable:hover { border-color: var(--line); background: var(--bg); }
  .editable:focus { outline: none; border-color: var(--ink); background: #fff; box-shadow: 0 0 0 3px var(--blue-soft); }

  .bar-cell { min-width: 180px; }
  .bar-wrap { display: flex; align-items: center; gap: 10px; }
  .bar-track { flex: 1; height: 6px; background: var(--bg-soft); border-radius: 999px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 999px; transition: width 0.35s cubic-bezier(.2,.7,.3,1); }
  .bar-pct { font-size: 11px; color: var(--ink-3); min-width: 38px; text-align: right; }

  .link-btn { background: none; border: 0; color: var(--sage-ink, var(--ink-2)); font: inherit; cursor: pointer; padding: 0; text-decoration: underline; text-underline-offset: 3px; font-size: 12px; }
  .link-btn:hover { color: var(--ink); }
  .add-cat-row td { background: transparent; }
  .add-cat-row:hover td { background: var(--bg-soft); }
  .hidden-hint td { background: transparent; }

  .row-group td { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-3); font-weight: 600; padding: 8px 14px; background: var(--bg-soft); }
  .subtotal-row td { font-weight: 600; background: #fbf8f1; }

  .delete-btn { opacity: 0; color: var(--ink-3); padding: 4px; border-radius: 4px; transition: all 0.15s; }
  tr:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: var(--terra-ink); background: var(--terra-soft); }

  .add-row { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; color: var(--ink-3); font-size: 13px; cursor: pointer; border-top: 1px dashed var(--line); transition: all 0.15s; }
  .add-row:hover { background: var(--bg-soft); color: var(--ink); }

  /* side */
  .side { display: flex; flex-direction: column; gap: 14px; }
  .side h3 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 16px; margin: 0 0 12px; letter-spacing: -0.01em; }

  .insight { display: flex; gap: 10px; align-items: flex-start; padding: 11px; border-radius: 10px; background: var(--bg-soft); font-size: 13px; }
  .insight + .insight { margin-top: 8px; }
  .insight-icon { width: 26px; height: 26px; border-radius: 7px; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; }

  .spark { width: 100%; height: 64px; }
  .mini-stat + .mini-stat { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); }
  .mini-stat-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
  .mini-stat-head .name { font-size: 13px; font-weight: 500; }
  .mini-stat-head .vals { font-size: 12px; color: var(--ink-3); }

  /* transactions */
  .tx-form { display: grid; grid-template-columns: 130px 110px 1fr 110px 1fr auto; gap: 8px; padding: 12px 14px; background: var(--bg-soft); border-bottom: 1px solid var(--line); align-items: center; }
  .tx-form input, .tx-form select { padding: 7px 10px; border: 1px solid var(--line); border-radius: 7px; background: var(--bg-elev); }
  .tx-form input:focus, .tx-form select:focus { outline: none; border-color: var(--ink); box-shadow: 0 0 0 3px var(--blue-soft); }
  .tx-form .btn-primary { padding: 7px 14px; border-radius: 7px; }
  .tx-form label { grid-column: 1 / -1; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-3); font-weight: 600; margin-bottom: -2px; }

  .tx-list { max-height: 480px; overflow-y: auto; }
  .tx-row { display: grid; grid-template-columns: 96px 90px 1fr 1fr 100px auto; gap: 12px; padding: 10px 18px; border-bottom: 1px solid var(--line); align-items: center; font-size: 13px; }
  .tx-row:hover { background: #fdfbf6; }
  .tx-row:last-child { border-bottom: 0; }
  .tx-date { color: var(--ink-3); font-size: 12px; }
  .tx-type { display: inline-flex; align-items: center; gap: 5px; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500; width: fit-content; }
  .tx-type.income { background: var(--sage-soft); color: var(--sage-ink); }
  .tx-type.expense { background: var(--terra-soft); color: var(--terra-ink); }
  .tx-amount { text-align: right; font-weight: 500; }
  .tx-amount.income { color: var(--sage-ink); }
  .tx-amount.expense { color: var(--ink); }
  .tx-details { color: var(--ink-3); font-size: 12px; }

  .tx-filter { display: flex; gap: 8px; align-items: center; padding: 10px 14px; border-bottom: 1px solid var(--line); background: var(--bg-elev); }
  .tx-filter input, .tx-filter select { padding: 6px 10px; border: 1px solid var(--line); border-radius: 7px; background: var(--bg-elev); font-size: 13px; }
  .tx-filter input:focus, .tx-filter select:focus { outline: none; border-color: var(--ink); box-shadow: 0 0 0 3px var(--blue-soft); }

  /* modal */
  .modal-back { position: fixed; inset: 0; background: rgba(20,18,14,0.4); backdrop-filter: blur(2px); z-index: 200; display: flex; align-items: center; justify-content: center; }
  .modal { background: var(--bg-elev); border-radius: 16px; border: 1px solid var(--line); padding: 24px; width: 460px; max-width: calc(100vw - 40px); box-shadow: 0 20px 60px -10px rgba(0,0,0,0.25); }
  .modal h3 { margin: 0 0 14px; font-family: 'Fraunces', serif; font-weight: 500; font-size: 20px; letter-spacing: -0.01em; }
  .modal-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; min-width: 0; }
  .modal-row label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-3); font-weight: 600; }
  .modal-row input, .modal-row select { padding: 9px 12px; border: 1px solid var(--line); border-radius: 8px; background: var(--bg); width: 100%; min-width: 0; box-sizing: border-box; font: inherit; color: inherit; }
  .modal-row input:focus, .modal-row select:focus { outline: none; border-color: var(--ink); background: #fff; box-shadow: 0 0 0 3px var(--blue-soft); }
  .modal-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }

  /* tweaks panel */
  .tweaks-panel { position: fixed; bottom: 20px; right: 20px; width: 280px; background: var(--bg-elev); border: 1px solid var(--line); border-radius: 14px; padding: 16px; box-shadow: 0 10px 40px -10px rgba(0,0,0,0.15); z-index: 100; display: none; }
  .tweaks-panel.open { display: block; }
  .tweaks-panel h4 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 15px; margin: 0 0 12px; }
  .tweak-row { margin-bottom: 10px; }
  .tweak-row label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-3); display: block; margin-bottom: 6px; font-weight: 600; }
  .swatches { display: flex; gap: 6px; }
  .swatch { width: 26px; height: 26px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; transition: transform 0.15s; }
  .swatch:hover { transform: scale(1.1); }
  .swatch.active { border-color: var(--ink); }

  body.theme-dark { --bg:#1a1916; --bg-elev:#24221e; --bg-soft:#2e2b26; --ink:#f5f1e8; --ink-2:#c8c1b3; --ink-3:#8a8477; --line:#3a3630; --line-strong:#4a4540; }
  body.theme-dark .card.feature { background: linear-gradient(135deg, #26241f 0%, var(--bg-elev) 100%); }
  body.theme-dark tbody tr:hover td, body.theme-dark .tx-row:hover { background: #2a2722; }
  body.theme-dark .subtotal-row td { background: #2a2722; }
  body.theme-cool { --bg:#f4f7fa; --bg-elev:#ffffff; --bg-soft:#e9eef4; --ink:#1a2330; --ink-2:#43536a; --ink-3:#7b879a; --line:#dde4ed; --line-strong:#c9d3e0; }
  body.theme-sage { --bg:#f4f6f2; --bg-elev:#ffffff; --bg-soft:#e8ece2; --ink:#1d251c; --ink-2:#485344; --ink-3:#818c7d; --line:#dee3d8; --line-strong:#c6ccbe; }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>

  <script>
  (() => {
    const FILE_NAME_DEFAULT = 'Budget Data.json';
    const IDB_NAME = 'clements-budget';
    const IDB_STORE = 'handles';
    const IDB_KEY = 'fileHandle';
    const LS_USER = 'clements-budget.user';
    const SAVE_DEBOUNCE_MS = 600;

    // --- IndexedDB helpers for persisting the FileSystemFileHandle across reloads
    function openIdb() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(IDB_NAME, 1);
        req.onupgradeneeded = () => req.result.createObjectStore(IDB_STORE);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }
    async function idbGet(key) {
      const db = await openIdb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(IDB_STORE, 'readonly');
        const req = tx.objectStore(IDB_STORE).get(key);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }
    async function idbSet(key, val) {
      const db = await openIdb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(IDB_STORE, 'readwrite');
        tx.objectStore(IDB_STORE).put(val, key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }
    async function idbDel(key) {
      const db = await openIdb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(IDB_STORE, 'readwrite');
        tx.objectStore(IDB_STORE).delete(key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    // --- Seed payload from the embedded JSON (only used on true first run)
    function readEmbedded() {
      let budgets = {};
      let txs = [];
      try {
        const bEl = document.getElementById('imported-budgets');
        if (bEl) budgets = JSON.parse(bEl.textContent.trim() || '{}');
      } catch (e) { console.warn('embedded budgets parse failed', e); }
      try {
        const tEl = document.getElementById('imported-tx');
        if (tEl) txs = JSON.parse(tEl.textContent.trim() || '[]');
      } catch (e) { console.warn('embedded tx parse failed', e); }
      // Strip any legacy ids from embedded tx so we control identity
      txs = txs.map((t, i) => ({ ...t, id: t.id || 't' + i }));
      return {
        version: 1,
        budgets,
        txs,
        meta: {
          lastEditedBy: null,
          lastEditedAt: null,
          createdAt: new Date().toISOString()
        }
      };
    }

    // --- Normalize any loaded payload; backfills missing fields
    function normalize(data) {
      if (!data || typeof data !== 'object') return readEmbedded();
      return {
        version: data.version || 1,
        budgets: data.budgets || {},
        txs: (data.txs || []).map((t, i) => ({ ...t, id: t.id || 't' + i })),
        meta: data.meta || { lastEditedBy: null, lastEditedAt: null, createdAt: new Date().toISOString() }
      };
    }

    // --- File System Access support
    const FS_SUPPORTED = typeof window.showSaveFilePicker === 'function' && typeof window.showOpenFilePicker === 'function';

    async function verifyPermission(handle, readWrite) {
      if (!handle) return false;
      const opts = { mode: readWrite ? 'readwrite' : 'read' };
      if ((await handle.queryPermission(opts)) === 'granted') return true;
      if ((await handle.requestPermission(opts)) === 'granted') return true;
      return false;
    }

    async function readHandle(handle) {
      const file = await handle.getFile();
      const text = await file.text();
      try { return normalize(JSON.parse(text)); }
      catch { return normalize(null); }
    }

    async function writeHandle(handle, payload) {
      const w = await handle.createWritable();
      await w.write(JSON.stringify(payload, null, 2));
      await w.close();

    function setUser(name) { localStorage.setItem(LS_USER, name); }

    // --- Pub/sub for status
    const listeners = new Set();
    function emit() { for (const l of listeners) l(DataStore.status()); }

    let currentHandle = null;
    let currentFileName = FILE_NAME_DEFAULT;
    let currentPayload = null;
    let saveState = 'idle'; // 'idle' | 'dirty' | 'saving' | 'saved' | 'error' | 'unlinked'
    let lastSavedAt = null;
    let saveError = null;
    let saveTimer = null;

    const DataStore = {
      FS_SUPPORTED,

      getUser,
      setUser,

      subscribe(fn) { listeners.add(fn); fn(DataStore.status()); return () => listeners.delete(fn); },

      status() {
        return {
          linked: !!currentHandle,
          fileName: currentFileName,
          saveState,
          lastSavedAt,
          saveError,
          user: getUser(),
          lastEditedBy: currentPayload?.meta?.lastEditedBy || null,
          lastEditedAt: currentPayload?.meta?.lastEditedAt || null,
          fsSupported: FS_SUPPORTED
        };
      },

      // Initial load: try to restore a previously-linked handle from IndexedDB,
      // else fall back to the embedded data (first run).
      async init() {
        if (FS_SUPPORTED) {
          try {
            const h = await idbGet(IDB_KEY);
            if (h) {
              // Permission may need a user gesture — query silently first
              const ok = (await h.queryPermission({ mode: 'readwrite' })) === 'granted';
              if (ok) {
                currentHandle = h;
                currentFileName = h.name || FILE_NAME_DEFAULT;
                currentPayload = await readHandle(h);
                saveState = 'saved';
                lastSavedAt = new Date();
                emit();
                return currentPayload;
              } else {
                // Handle exists but needs permission; keep it and fall back to embedded for now.
                // A "Reconnect" button in the UI will re-request permission on click.
                currentHandle = h;
                currentFileName = h.name || FILE_NAME_DEFAULT;
                currentPayload = readEmbedded();
                saveState = 'unlinked';
                emit();
                return currentPayload;
              }
            }
          } catch (e) { console.warn('handle restore failed', e); }
        }
        currentPayload = readEmbedded();
        saveState = 'unlinked';
        emit();
        return currentPayload;
      },

      // User gesture: pick a brand-new file location to save into
      async linkNewFile() {
        if (!FS_SUPPORTED) throw new Error('File System Access not supported in this browser.');
        const handle = await window.showSaveFilePicker({
          suggestedName: FILE_NAME_DEFAULT,
          types: [{ description: 'Budget data', accept: { 'application/json': ['.json'] } }]
        });
        currentHandle = handle;
        currentFileName = handle.name || FILE_NAME_DEFAULT;
        await idbSet(IDB_KEY, handle);
        // Write current payload immediately so the file has content
        if (currentPayload) await writeHandle(handle, currentPayload);
        saveState = 'saved';
        lastSavedAt = new Date();
        emit();
      },

      // User gesture: pick an existing data file to load from
      async openExistingFile() {
        if (!FS_SUPPORTED) throw new Error('File System Access not supported in this browser.');
        const [handle] = await window.showOpenFilePicker({
          types: [{ description: 'Budget data', accept: { 'application/json': ['.json'] } }],
          multiple: false
        });
        // Need readwrite so we can save back to it
        const ok = await verifyPermission(handle, true);
        if (!ok) throw new Error('Permission denied.');
        currentHandle = handle;
        currentFileName = handle.name || FILE_NAME_DEFAULT;
        currentPayload = await readHandle(handle);
        await idbSet(IDB_KEY, handle);
        saveState = 'saved';
        lastSavedAt = new Date();
        emit();
        return currentPayload;
      },

      // User gesture: re-grant permission for the previously-linked handle
      async reconnect() {
        if (!currentHandle) throw new Error('No file is linked.');
        const ok = await verifyPermission(currentHandle, true);
        if (!ok) throw new Error('Permission denied.');
        currentPayload = await readHandle(currentHandle);
        saveState = 'saved';
        lastSavedAt = new Date();
        emit();
        return currentPayload;
      },

      // Forget the linked file (does not delete it)
      async unlink() {
        currentHandle = null;
        await idbDel(IDB_KEY);
        saveState = 'unlinked';
        emit();
      },

      // App calls this on every data change. Debounced write.
      async save(payload) {
        currentPayload = {
          version: 1,
          budgets: payload.budgets,
          txs: payload.txs,
          meta: {
            ...(currentPayload?.meta || {}),
            lastEditedBy: getUser() || null,
            lastEditedAt: new Date().toISOString(),
            createdAt: currentPayload?.meta?.createdAt || new Date().toISOString()
          }
        };
        saveState = currentHandle ? 'dirty' : 'unlinked';
        emit();
        if (!currentHandle) return; // nothing to persist to yet
        clearTimeout(saveTimer);
        saveTimer = setTimeout(async () => {
          saveState = 'saving'; emit();
          try {
            await writeHandle(currentHandle, currentPayload);
            saveState = 'saved';
            lastSavedAt = new Date();
            saveError = null;
          } catch (e) {
            saveState = 'error';
            saveError = e.message || String(e);
            console.error('save failed', e);
          }
          emit();
        }, SAVE_DEBOUNCE_MS);
      },

      // Force-save immediately (Ctrl+S)
      async saveNow() {
        clearTimeout(saveTimer);
        if (!currentHandle || !currentPayload) return;
        saveState = 'saving'; emit();
        try {
          await writeHandle(currentHandle, currentPayload);
          saveState = 'saved';
          lastSavedAt = new Date();
          saveError = null;
        } catch (e) {
          saveState = 'error';
          saveError = e.message || String(e);
        }
        emit();
      },

      // Fallback: download JSON file
      exportDownload() {
        const payload = currentPayload || readEmbedded();
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = currentFileName || FILE_NAME_DEFAULT;
        document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);
      },

      // Fallback: import JSON file via <input type=file>
      async importFile(file) {
        const text = await file.text();
        currentPayload = normalize(JSON.parse(text));
        saveState = currentHandle ? 'dirty' : 'unlinked';
        emit();
        return currentPayload;
      },

      getPayload() { return currentPayload; }
    };

    window.DataStore = DataStore;
  })();
  </script>

                expenses: EXPENSE_CATS.map(n => ({name:n, months:new Array(12).fill(0)})),
                savings:  SAVINGS_CATS.map(n => ({name:n, months:new Array(12).fill(0)}))
              };
              const nextBlock = {
                income:   base.income.map(r   => ({name:r.name, months:r.months.slice()})),
                expenses: base.expenses.map(r => ({name:r.name, months:r.months.slice()})),
                savings:  base.savings.map(r  => ({name:r.name, months:r.months.slice()}))
              };
              // only add if not already present (defensive)
              if (!nextBlock[blockKey].some(r => r.name.toLowerCase() === clean.toLowerCase())) {
                nextBlock[blockKey].push({name: clean, months: new Array(12).fill(0)});
              }
              next[y] = nextBlock;
            }
            return next;
          });
          // Also extend the canonical category list so future seeded years include it.
          if (type === 'Income'   && !INCOME_CATS.includes(clean))  INCOME_CATS.push(clean);
          if (type === 'Expenses' && !EXPENSE_CATS.includes(clean)) EXPENSE_CATS.push(clean);
          if (type === 'Savings'  && !SAVINGS_CATS.includes(clean)) SAVINGS_CATS.push(clean);
        }).catch(err => {
          console.error('Add category failed:', err);
          alert('Could not add category: ' + err.message);
        });
      };

      // filter transactions by current view
      const visibleTxs = useMemo(()=>{
        let out = txs.slice();
        // scope to view unless user picked "All time" explicitly
        if (txFilter.month === 'current') {
          if (view === 'month') {
            const prefix = year + '-' + String(monthIdx+1).padStart(2,'0');
            out = out.filter(t => t.date.startsWith(prefix));
          } else if (view === 'year') {
            out = out.filter(t => t.date.startsWith(year+'-'));
          }
          // view 'all' → no date filter
        }
        if (txFilter.type !== 'all') out = out.filter(t => t.type === txFilter.type);
        if (txFilter.q) {
          const q = txFilter.q.toLowerCase();
          out = out.filter(t =>
            t.category.toLowerCase().includes(q) ||
            (t.details||'').toLowerCase().includes(q));
        }
        out.sort((a,b) => b.date.localeCompare(a.date));
        return out;
      }, [txs, monthIdx, year, view, txFilter]);

      const visible = tab === 'all' ? groups : groups.filter(g => g.key === tab);
      const viewLabel = view === 'month' ? MONTHS_LONG[monthIdx] + ' ' + year
                      : view === 'year'  ? year + ' overview'
                                         : 'All time';
      const currentMonthLabel = viewLabel;
      const monthChange = view === 'month' && monthIdx > 0 ? history.net[monthIdx] - history.net[monthIdx-1] : 0;

      const defaultTxDate = (()=>{
        const today = new Date();
        const ty = today.getFullYear(), tm = today.getMonth();
        if (view === 'month') {
          if (ty === year && tm === monthIdx) return today.toISOString().slice(0,10);
          return year + '-' + String(monthIdx+1).padStart(2,'0') + '-15';
        }
        return today.toISOString().slice(0,10);
      })();

      return (
        <div className="app" data-screen-label="01 Budget">
          <TxModal open={modalOpen} onClose={()=>setModalOpen(false)} onSave={addTx}
            categories={categoriesByType} defaultDate={defaultTxDate}/>

          {/* Topbar */}
          <div className="topbar">
            <div className="brand">
              <div className="brand-mark" aria-hidden="true">
                <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                  {/* allocation flows out of the bag */}
                  <path d="M20 18 Q12 14 6 8"  stroke="var(--sage)"       strokeWidth="1.5" strokeLinecap="round" strokeDasharray="2 2"/>
                  <path d="M20 18 Q20 10 20 4"  stroke="var(--blue)"       strokeWidth="1.5" strokeLinecap="round" strokeDasharray="2 2"/>
                  <path d="M20 18 Q28 14 34 8"  stroke="var(--amber)"      strokeWidth="1.5" strokeLinecap="round" strokeDasharray="2 2"/>
                  {/* destination dots */}
                  <circle cx="6" cy="8"  r="2" fill="var(--sage)"/>
                  <circle cx="20" cy="4" r="2" fill="var(--blue)"/>
                  <circle cx="34" cy="8" r="2" fill="var(--amber)"/>
                  {/* bag tie */}
                  <path d="M15 15 L17 12 L23 12 L25 15 Z" fill="var(--ink-2)"/>
                  {/* bag body */}
                  <path d="M14 16 Q12 18 12 24 Q12 34 20 36 Q28 34 28 24 Q28 18 26 16 Z"
                        fill="var(--terracotta)" stroke="var(--ink)" strokeWidth="0.8" strokeLinejoin="round"/>
                  {/* dollar sign */}
                  <text x="20" y="29" textAnchor="middle"
                        fontFamily="'Fraunces', serif" fontSize="11" fontWeight="600" fill="#fff">$</text>
                </svg>
              </div>
              <div>
                <h1 className="serif">The Clements Fam Budget</h1>
                <div className="sub">
                  {txs.length.toLocaleString()} transactions
                  <LastEditedBy />
                </div>
              </div>
            </div>

            <div className="view-switch">
              <div className="seg">
                <button className={view==='month'?'on':''} onClick={()=>setView('month')}>Month</button>
                <button className={view==='year'?'on':''} onClick={()=>setView('year')}>Year</button>
                <button className={view==='all'?'on':''} onClick={()=>setView('all')}>All time</button>
              </div>
              {view === 'month' && (
                <select className="select-month" value={monthIdx} onChange={e=>setMonthIdx(parseInt(e.target.value))}>
                  {MONTHS_LONG.map((m,i) => <option key={i} value={i}>{m}</option>)}
                </select>
              )}
              {view !== 'all' && (
                <select className="select-year" value={year} onChange={e=>setYear(parseInt(e.target.value))}>
                  {years.map(y => <option key={y} value={y}>{y}</option>)}
                </select>
              )}
            </div>

            <div className="actions">
              <button className="btn" onClick={()=>setTweaksOpen(v=>!v)}>Theme</button>
              <button className="btn btn-primary" onClick={()=>setModalOpen(true)}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add transaction
              </button>
            </div>
          </div>

          {/* Hero */}
          <div className="hero">
            <div className="card feature">
              <div>
                <div className="stat-label">{view === 'month' ? 'Net this month' : view === 'year' ? 'Net '+year : 'Net · all time'}</div>
                <div className="stat-val serif">{fmt(totals.netA)}</div>
                <div className="stat-sub">
                  {view === 'month' && monthIdx > 0 && <span className={"pill " + (monthChange>=0?'up':'down')}>
                    {monthChange>=0?'▲':'▼'} {fmtSigned(monthChange)} vs {MONTHS[monthIdx-1]}
                  </span>}
                  <span style={{marginLeft: view==='month' && monthIdx > 0 ? 8 : 0, color:'var(--ink-3)'}}>planned {fmt(totals.netB)}</span>
                </div>
              </div>
              <Spark data={view==='month' ? history.net.slice(0, monthIdx+1) : view==='year' ? history.net : yearlyHistory.map(y=>y.net)} color="var(--sage)"/>
            </div>

            <div className="card">
              <div className="stat-label">Income</div>
              <div className="stat-val serif small">{fmt(totals.incA)}</div>
              <div className="stat-sub" style={{color:'var(--ink-3)'}}>of {fmt(totals.incB)} planned</div>
              <div style={{marginTop:12}}><Bar value={totals.incA} budget={totals.incB} accent="sage" rowType="Income"/></div>
            </div>

            <div className="card">
              <div className="stat-label">Spent</div>
              <div className="stat-val serif small">{fmt(totals.expA)}</div>
              <div className="stat-sub" style={{color:'var(--ink-3)'}}>of {fmt(totals.expB)} budgeted</div>
              <div style={{marginTop:12}}><Bar value={totals.expA} budget={totals.expB} accent="terra" rowType="Expenses"/></div>
            </div>

            <div className="card">
              <div className="stat-label">Savings rate</div>
              <div className="donut-wrap" style={{marginTop:4}}>
                <Donut slices={[
                  { value: Math.max(0, totals.incA - totals.expA), color: 'var(--blue)' },
                  { value: Math.max(0, totals.expA), color: 'var(--line)' }
                ]}/>
                <div className="legend">
                  <div className="legend-row"><span className="legend-dot" style={{background:'var(--blue)'}}/><span>Saved <strong className="num">{fmt(Math.max(0, totals.incA - totals.expA))}</strong></span></div>
                  <div className="legend-row"><span className="legend-dot" style={{background:'var(--terracotta)'}}/><span>Spent <strong className="num">{fmt(totals.expA)}</strong></span></div>
                  <div className="legend-row"><span className="legend-dot" style={{background:'var(--sage)'}}/><span>Income <strong className="num">{fmt(totals.incA)}</strong></span></div>
                </div>
              </div>
            </div>
          </div>

          {/* Allocation strip */}
          <AllocationStrip totals={totals} view={view} year={year} monthName={MONTHS[monthIdx]}/>

          {/* Tabs */}
          <div className="tabs">
            {[{k:'all',l:'All categories'},{k:'Income',l:'Income'},{k:'Expenses',l:'Expenses'},{k:'Savings',l:'Savings'}].map(t => (
              <button key={t.k} className={"tab " + (tab===t.k?'active':'')} onClick={()=>setTab(t.k)}>{t.l}</button>
            ))}
          </div>

          {/* Main grid */}
          <div className="main-grid">
            <div style={{display:'flex', flexDirection:'column', gap:18}}>
              {/* Categories table */}
              <div className="table-card">
                <div className="table-head">
                  <h2 className="serif">Categories · {viewLabel}</h2>
                  <div style={{fontSize:12, color:'var(--ink-3)', display:'flex', gap:14, alignItems:'center'}}>
                    <span>click any budget value to edit</span>
                  </div>
                </div>
                <table>
                  <thead>
                    <tr>
                      <th>Category</th>
                      <th className="num">Budget</th>
                      <th className="num">Actual</th>
                      <th className="num">Remaining</th>
                      <th>Progress</th>
                    </tr>
                  </thead>
                  <tbody>
                    {visible.map(g => (
                      <React.Fragment key={g.key}>
                        <GroupHeader label={g.label}
                          right={<span className="num" style={{color:'var(--ink-2)'}}>{fmt(g.actual)} / {fmt(g.budget)}</span>}/>
                        {g.rows.map(r => <Row key={r.key} row={r} monthIdx={monthIdx} view={view} budget={budgetForRow(r)} onEdit={editBudget}/>)}
                        {!showHiddenFor.has(g.key) && g.hiddenCount > 0 && (
                          <tr className="hidden-hint">
                            <td colSpan="5" style={{padding:'8px 14px 8px 56px', color:'var(--ink-3)', fontSize:12, fontStyle:'italic'}}>
                              {g.hiddenCount} {g.key.toLowerCase()} categor{g.hiddenCount===1?'y':'ies'} hidden (no activity or budget this {view === 'month' ? 'month' : view === 'year' ? 'year' : 'period'}).{' '}
                              <button className="link-btn" onClick={()=>toggleShownFor(g.key)}>Show all</button>
                            </td>
                          </tr>
                        )}
                        {showHiddenFor.has(g.key) && (
                          <tr className="hidden-hint">
                            <td colSpan="5" style={{padding:'8px 14px 8px 56px', color:'var(--ink-3)', fontSize:12, fontStyle:'italic'}}>
                              Showing all {g.key.toLowerCase()} categories.{' '}
                              <button className="link-btn" onClick={()=>toggleShownFor(g.key)}>Hide unused</button>
                            </td>
                          </tr>
                        )}
                        {addingTo === g.key ? (
                          <tr className="add-cat-row">
                            <td colSpan="5" style={{padding:'10px 14px 10px 56px'}}>
                              <div style={{display:'flex', gap:8, alignItems:'center'}}>
                                <input
                                  autoFocus
                                  type="text"
                                  placeholder={'New ' + g.key.toLowerCase() + ' category name'}
                                  value={newCatName}
                                  onChange={e=>setNewCatName(e.target.value)}
                                  onKeyDown={e => {
                                    if (e.key === 'Enter') { addCategory(g.key, newCatName); setAddingTo(null); setNewCatName(''); }
                                    if (e.key === 'Escape') { setAddingTo(null); setNewCatName(''); }
                                  }}
                                  style={{flex:1, padding:'7px 10px', border:'1px solid var(--line)', borderRadius:7, background:'var(--bg)', font:'inherit', color:'inherit'}}
                                />
                                <button className="btn btn-primary" style={{padding:'6px 12px'}}
                                  onClick={()=>{ addCategory(g.key, newCatName); setAddingTo(null); setNewCatName(''); }}>
                                  Add
                                </button>
                                <button className="btn" style={{padding:'6px 12px'}}
                                  onClick={()=>{ setAddingTo(null); setNewCatName(''); }}>
                                  Cancel
                                </button>
                              </div>
                            </td>
                          </tr>
                        ) : (
                          <tr className="add-cat-row">
                            <td colSpan="5" style={{padding:'6px 14px 6px 56px'}}>
                              <button className="link-btn" onClick={()=>{ setAddingTo(g.key); setNewCatName(''); }}>
                                + Add {g.key.toLowerCase().replace(/s$/,'')} category
                              </button>
                            </td>
                          </tr>
                        )}
                        <SubtotalRow label={g.label} budget={g.budget} actual={g.actual} accent={g.accent} kind={g.key}/>
                      </React.Fragment>
                    ))}
                  </tbody>
                </table>
              </div>

              {/* Transactions */}
              <div className="table-card">
                <div className="table-head">
                  <h2 className="serif">Transactions</h2>
                  <button className="btn btn-primary" style={{padding:'6px 12px'}} onClick={()=>setModalOpen(true)}>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add
                  </button>
                </div>
                <div className="tx-filter">
                  <input placeholder="Search category or details…" value={txFilter.q}
                    onChange={e=>setTxFilter({...txFilter, q: e.target.value})} style={{flex:1}}/>
                  <select value={txFilter.type} onChange={e=>setTxFilter({...txFilter, type: e.target.value})}>
                    <option value="all">All types</option>
                    <option value="Income">Income</option>
                    <option value="Expenses">Expenses</option>
                    <option value="Savings">Savings</option>
                  </select>
                  <select value={txFilter.month} onChange={e=>setTxFilter({...txFilter, month: e.target.value})}>
                    <option value="current">{view==='month' ? 'This month' : view==='year' ? 'This year' : 'All time'}</option>
                    <option value="all">All time</option>
                  </select>
                </div>
                <div className="tx-list">
                  {visibleTxs.length === 0 && (
                    <div style={{padding:'40px 20px', textAlign:'center', color:'var(--ink-3)', fontSize:13}}>
                      No transactions match. Try "All time" or <button className="btn" style={{padding:'4px 10px', marginLeft:6}} onClick={()=>setModalOpen(true)}>add one</button>
                    </div>
                  )}
                  {visibleTxs.slice(0, txLimit).map(t => (
                    <div key={t.id} className="tx-row">
                      <span className="tx-date num">{t.date.slice(5)}</span>
                      <span className={"tx-type " + (t.type==='Income'?'income':t.type==='Expenses'?'expense':'')}
                        style={t.type==='Savings'?{background:'var(--blue-soft)',color:'var(--blue-ink)'}:undefined}>
                        {t.type}
                      </span>
                      <span style={{fontWeight:500}}>{t.category}</span>
                      <span className="tx-details">{t.details || '—'}</span>
                      <span className={"tx-amount num " + (t.type==='Income'?'income':'expense')}>
                        {t.type==='Income' ? '+' : '−'}{fmtCents(t.amount)}
                      </span>
                      <button className="delete-btn" onClick={()=>deleteTx(t.id)} style={{opacity:0.6}} title="Delete">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
                      </button>
                    </div>
                  ))}
                  {visibleTxs.length > txLimit && (
                    <div style={{padding:'10px 18px', textAlign:'center', color:'var(--ink-3)', fontSize:12, borderTop:'1px solid var(--line)', display:'flex', gap:10, justifyContent:'center', alignItems:'center'}}>
                      <span>Showing {txLimit} of {visibleTxs.length}</span>
                      <button className="link-btn" onClick={()=>setTxLimit(n => n + 200)}>Load 200 more</button>
                      <button className="link-btn" onClick={()=>setTxLimit(visibleTxs.length)}>Show all</button>
                    </div>
                  )}
                </div>
              </div>

              {/* Fun fact */}
              <FactCard txs={txs}/>
            </div>

            {/* Side panel */}
            <div className="side">
              <div className="card">
                <h3 className="serif">
                  {view === 'all' ? 'Yearly trend' : view === 'year' ? year + ' monthly trend' : year + ' trend'}
                </h3>
                {view === 'all' ? (
                  <React.Fragment>
                    <div className="mini-stat">
                      <div className="mini-stat-head"><span className="name">Income</span><span className="vals num">{fmt(totals.incA)}</span></div>
                      <Spark data={yearlyHistory.map(y=>y.inc)} color="var(--sage)"/>
                    </div>
                    <div className="mini-stat">
                      <div className="mini-stat-head"><span className="name">Expenses</span><span className="vals num">{fmt(totals.expA)}</span></div>
                      <Spark data={yearlyHistory.map(y=>y.exp)} color="var(--terracotta)"/>
                    </div>
                    <div className="mini-stat">
                      <div className="mini-stat-head"><span className="name">Savings</span><span className="vals num">{fmt(totals.savA)}</span></div>
                      <Spark data={yearlyHistory.map(y=>y.sav)} color="var(--blue)"/>
                    </div>
                    <div style={{display:'flex', justifyContent:'space-between', fontSize:11, color:'var(--ink-3)', marginTop:6, padding:'0 4px'}}>
                      {yearlyHistory.map(y => <span key={y.year} className="num">{y.year}</span>)}
                    </div>
                  </React.Fragment>
                ) : (
                  <React.Fragment>
                    <div className="mini-stat">
                      <div className="mini-stat-head"><span className="name">Income</span><span className="vals num">{fmt(view==='year' ? history.inc.reduce((a,b)=>a+b,0) : history.inc[monthIdx])}</span></div>
                      <Spark data={view==='year' ? history.inc : history.inc.slice(0, monthIdx+1)} color="var(--sage)"/>
                    </div>
                    <div className="mini-stat">
                      <div className="mini-stat-head"><span className="name">Expenses</span><span className="vals num">{fmt(view==='year' ? history.exp.reduce((a,b)=>a+b,0) : history.exp[monthIdx])}</span></div>
                      <Spark data={view==='year' ? history.exp : history.exp.slice(0, monthIdx+1)} color="var(--terracotta)"/>
                    </div>
                    <div className="mini-stat">
                      <div className="mini-stat-head"><span className="name">Savings</span><span className="vals num">{fmt(view==='year' ? history.sav.reduce((a,b)=>a+b,0) : history.sav[monthIdx])}</span></div>
                      <Spark data={view==='year' ? history.sav : history.sav.slice(0, monthIdx+1)} color="var(--blue)"/>
                    </div>
                  </React.Fragment>
                )}
              </div>

              <div className="card">
                <h3 className="serif">Insights</h3>
                {(() => {
                  const items = [];
                  // over-budget category
                  const over = decoratedRows.filter(r => r.type === 'Expenses' && budgetForRow(r) > 0 && r.actual > budgetForRow(r))
                    .sort((a,b) => (b.actual-budgetForRow(b)) - (a.actual-budgetForRow(a)))[0];
                  if (over) items.push(
                    <div className="insight" key="over">
                      <span className="insight-icon" style={{background:'var(--terra-soft)', color:'var(--terra-ink)'}}>!</span>
                      <div><strong>{over.name}</strong> is over budget — {fmt(over.actual)} of {fmt(budgetForRow(over))}.</div>
                    </div>);
                  // net delta (month view only)
                  if (view === 'month' && monthIdx > 0 && monthChange > 0) items.push(
                    <div className="insight" key="net">
                      <span className="insight-icon" style={{background:'var(--sage-soft)', color:'var(--sage-ink)'}}>↑</span>
                      <div><strong>Net up {fmt(monthChange)}</strong> vs {MONTHS[monthIdx-1]} — keep it going.</div>
                    </div>);
                  // best year (all-time view)
                  if (view === 'all' && yearlyHistory.length > 1) {
                    const bestYr = [...yearlyHistory].sort((a,b)=>b.net-a.net)[0];
                    items.push(
                      <div className="insight" key="best">
                        <span className="insight-icon" style={{background:'var(--amber-soft)', color:'var(--amber-ink)'}}>✓</span>
                        <div>Best net year: <strong>{bestYr.year}</strong> at {fmt(bestYr.net)}.</div>
                      </div>);
                  }
                  if (totals.savingsRate > 0) items.push(
                    <div className="insight" key="sr">
                      <span className="insight-icon" style={{background:'var(--blue-soft)', color:'var(--blue-ink)'}}>★</span>
                      <div><strong>Savings rate {Math.round(totals.savingsRate*100)}%</strong> of {view==='month'?MONTHS[monthIdx]:view==='year'?year:'all-time'} income.</div>
                    </div>);
                  if (items.length === 0) items.push(
                    <div className="insight" key="empty">
                      <span className="insight-icon" style={{background:'var(--bg-elev)', color:'var(--ink-3)'}}>·</span>
                      <div>No activity recorded for {viewLabel} yet. <button className="btn" style={{padding:'3px 8px', marginLeft:4}} onClick={()=>setModalOpen(true)}>Add one</button></div>
                    </div>);
                  return items;
                })()}
              </div>

              <div className="card">
                <h3 className="serif">Top spending</h3>
                <div style={{display:'flex', flexDirection:'column', gap:10, marginTop:4}}>
                  {decoratedRows.filter(r=>r.type==='Expenses' && r.actual > 0)
                    .sort((a,b)=>b.actual-a.actual).slice(0,5).map(r => (
                      <div key={r.key}>
                        <div style={{display:'flex', justifyContent:'space-between', fontSize:13, marginBottom:4}}>
                          <span style={{fontWeight:500}}>{r.name}</span>
                          <span className="num" style={{color:'var(--ink-3)'}}>{fmt(r.actual)}</span>
                        </div>
                        <Bar value={r.actual} budget={budgetForRow(r)||r.actual} accent={r.color} rowType={r.type}/>
                      </div>
                    ))}
                  {decoratedRows.filter(r=>r.type==='Expenses' && r.actual > 0).length === 0 && (
                    <div style={{color:'var(--ink-3)', fontSize:13}}>No spending logged for {viewLabel}.</div>
                  )}
                </div>
              </div>
            </div>
          </div>

          {/* Tweaks */}
          <div className={"tweaks-panel " + (tweaksOpen?'open':'')}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: 8}}>
              <h4 className="serif">Tweaks</h4>
              <button onClick={()=>setTweaksOpen(false)} style={{color:'var(--ink-3)', fontSize:18}}>×</button>
            </div>
            <div className="tweak-row">
              <label>Theme</label>
              <div className="swatches">
                {[
                  {k:'warm', c:'linear-gradient(135deg,#faf7f2,#f2ede4)'},
                  {k:'cool', c:'linear-gradient(135deg,#f4f7fa,#e9eef4)'},
                  {k:'sage', c:'linear-gradient(135deg,#f4f6f2,#e8ece2)'},
                  {k:'dark', c:'linear-gradient(135deg,#24221e,#1a1916)'}
                ].map(s => (
                  <div key={s.k} className={"swatch " + (tweaks.theme===s.k?'active':'')}
                    style={{background: s.c}}
                    onClick={()=>setTweak('theme', s.k)}/>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  
})();
</script>
  <!-- Bootstrap: authenticates user, loads data from Supabase,
       then activates the deferred React/Babel scripts above. -->
  <script src="supabase-client.js"></script>

  <!-- PWA: register the service worker so the app is installable.
       Only runs when served over https (so skipped during file:// local
       dev, and active only on the Vercel deployment). -->
  <script>
    if ('serviceWorker' in navigator && location.protocol === 'https:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(err => {
          console.warn('Service worker registration failed:', err);
        });
      });
    }
  </script>

</body>
</html>
