              }}
            >
              {MONTHS_LONG.map((m, i) => <option key={i} value={i}>{m}</option>)}
            </select>
          )}
          {showYear && (
            <select
              value={year}
              onChange={e => setYear(parseInt(e.target.value))}
              style={{
                flex: showMonth ? '0 0 100px' : 1,
                padding: '10px 12px',
                background: 'var(--bg-elev)', border: '1px solid var(--line)',
                borderRadius: 10, color: 'var(--ink)',
                fontSize: 14, fontWeight: 500,
                font: 'inherit'
              }}
            >
              {years.map(y => <option key={y} value={y}>{y}</option>)}
            </select>
          )}
        </div>
      );
    }
    window.MobilePeriodPicker = MobilePeriodPicker;

    // MobileSankey — simplified flow visualization for phones.
    // Just shows total Income → 3 buckets (Expenses/Savings/Leftover)
    // as horizontal stacked bars. No individual categories — those
    // are too cramped to read on a 380px-wide screen.
    var MobileSankey = function({ income, expenses, savings, leftover }) {
      const totalIn = income.reduce((a,b)=>a+b.amount, 0);
      const totalExp = expenses.reduce((a,b)=>a+b.amount, 0);
      const totalSav = savings.reduce((a,b)=>a+b.amount, 0);
      const lo = Math.max(0, leftover);
      const middleTotal = Math.max(1, totalExp + totalSav + lo);

      if (totalIn <= 0) {
        return (
          <div style={{padding: '40px 16px', textAlign: 'center', color: 'var(--ink-3)'}}>
            <div style={{fontFamily: "'Fraunces', serif", fontSize: 16, fontStyle: 'italic'}}>
              No income recorded for this period.
            </div>
          </div>
        );
      }

      const buckets = [
        { name: 'Expenses', amount: totalExp, color: 'var(--terracotta)', glyph: '💸' },
        { name: 'Savings',  amount: totalSav, color: 'var(--blue)',       glyph: '🏦' },
        { name: 'Leftover', amount: lo,       color: 'var(--amber)',      glyph: '✨' }
      ].filter(b => b.amount > 0);

      return (
        <div style={{padding: '8px 0'}}>
          {/* Income bar (full width) */}
          <div style={{marginBottom: 24}}>
            <div style={{
              display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
              marginBottom: 6
            }}>
              <span style={{fontFamily: "'Fraunces', serif", fontWeight: 600, fontSize: 14, color: 'var(--ink)'}}>
                💵 Income
              </span>
              <span className="num" style={{fontSize: 14, fontWeight: 600, color: 'var(--ink)'}}>
                {fmt(totalIn)}
              </span>
            </div>
            <div style={{
              height: 28, background: 'var(--sage)', borderRadius: 6,
              opacity: 0.85
            }}/>
          </div>

          {/* Down-arrow connector */}
          <div style={{textAlign: 'center', color: 'var(--ink-3)', marginBottom: 16, fontSize: 18}}>
            ↓
          </div>

          {/* Buckets stacked */}
          <div style={{display: 'flex', flexDirection: 'column', gap: 12}}>
            {buckets.map((b, i) => (
              <div key={i}>
                <div style={{
                  display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
                  marginBottom: 4
                }}>
                  <span style={{fontFamily: "'Fraunces', serif", fontWeight: 500, fontSize: 13, color: 'var(--ink)'}}>
                    {b.glyph} {b.name}
                  </span>
                  <span className="num" style={{fontSize: 13, color: 'var(--ink-2)'}}>
                    {fmt(b.amount)} <span style={{color: 'var(--ink-3)', fontSize: 11}}>· {((b.amount/totalIn)*100).toFixed(0)}%</span>
                  </span>
                </div>
                <div style={{
                  height: 22,
                  background: b.color,
                  width: ((b.amount / totalIn) * 100) + '%',
                  borderRadius: 6,
                  opacity: 0.85,
                  transition: 'width 0.3s'
                }}/>
              </div>
            ))}
          </div>
        </div>
      );
    }
    window.MobileSankey = MobileSankey;

    // PeriodChip — combined month/year picker for the desktop topbar.
    // Replaces two separate dropdowns with a single chip showing the
    // current period (e.g. "May 2026"), which opens a popover with the
    // month and year selectors stacked. Reduces visual clutter when
    // both controls don't need to be visible all the time.
    //
    // Props:
    //   view       — 'month' | 'year' (others render nothing)
    //   monthIdx   — current month index (0-11)
    //   year       — current year
    //   setMonthIdx, setYear — state setters
    //   years      — array of valid years to choose from
    var PeriodChip = function({ view, monthIdx, year, setMonthIdx, setYear, years }) {
      const { useState, useEffect, useRef } = React;
      const [open, setOpen] = useState(false);
      const ref = useRef(null);

      // Close on outside click or Escape
      useEffect(() => {
        if (!open) return;
        const onDoc = (e) => {
          if (ref.current && !ref.current.contains(e.target)) setOpen(false);
        };
        const onKey = (e) => { if (e.key === 'Escape') setOpen(false); };
        document.addEventListener('mousedown', onDoc);
        window.addEventListener('keydown', onKey);
        return () => {
          document.removeEventListener('mousedown', onDoc);
          window.removeEventListener('keydown', onKey);
        };
      }, [open]);

      if (view !== 'month' && view !== 'year') return null;

      const MONTHS_LONG = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const label = view === 'month'
        ? `${MONTHS_LONG[monthIdx]} ${year}`
        : `${year}`;

      return (
        <div ref={ref} style={{position: 'relative'}}>
          <button
            onClick={() => setOpen(o => !o)}
            className="select-month"
            style={{
              display: 'inline-flex', alignItems: 'center', gap: 8,
              cursor: 'pointer'
            }}
            aria-expanded={open}
            aria-haspopup="true"
          >
            <span>{label}</span>
            <span style={{fontSize: 10, opacity: 0.6, marginTop: 1}}>▾</span>
          </button>
          {open && (
            <div style={{
              position: 'absolute', top: 'calc(100% + 6px)', right: 0,
              minWidth: 200, padding: 12,
              background: 'var(--bg-elev)', border: '1px solid var(--line)',
              borderRadius: 10,
              boxShadow: '0 8px 24px rgba(0,0,0,0.10)',
              zIndex: 40,
              display: 'flex', flexDirection: 'column', gap: 10
            }}>
              {view === 'month' && (
                <div>
                  <div style={{fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--ink-3)', fontWeight: 600, marginBottom: 4}}>
                    Month
                  </div>
                  <select
                    className="select-month"
                    value={monthIdx}
                    onChange={e => setMonthIdx(parseInt(e.target.value))}
                    style={{width: '100%'}}
                    autoFocus
                  >
                    {MONTHS_LONG.map((m,i) => <option key={i} value={i}>{m}</option>)}
                  </select>
                </div>
              )}
              <div>
                <div style={{fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--ink-3)', fontWeight: 600, marginBottom: 4}}>
                  Year
                </div>
                <select
                  className="select-year"
                  value={year}
                  onChange={e => setYear(parseInt(e.target.value))}
                  style={{width: '100%'}}
                >
                  {years.map(y => <option key={y} value={y}>{y}</option>)}
                </select>
              </div>
            </div>
          )}
        </div>
      );
    }
    window.PeriodChip = PeriodChip;

    var GreetingLine = function() {
      const { useState, useEffect } = React;
      // Re-render every minute so the greeting shifts with the day
      // without needing a page reload (e.g. morning → afternoon at noon).
      const [, force] = useState(0);
      useEffect(() => {
        const id = setInterval(() => force(n => n+1), 60 * 1000);
        return () => clearInterval(id);
      }, []);

      const h = new Date().getHours();
      let greeting, emoji;
      if (h < 5) {
        greeting = 'Still up'; emoji = '🌙';
      } else if (h < 12) {
        greeting = 'Good morning'; emoji = '☀️';
      } else if (h < 17) {
        greeting = 'Good afternoon'; emoji = '🌤️';
      } else if (h < 21) {
        greeting = 'Good evening'; emoji = '🌆';
      } else {
        greeting = 'Good evening'; emoji = '🌙';
      }
      const name = window.__currentUser?.displayName || 'friend';

      return (
        <div className="greeting-line">
          <span className="greeting-emoji" aria-hidden="true">{emoji}</span>
          <span className="greeting-text">
            <span className="greeting-intro">{greeting}, </span>
            <span className="greeting-name">{name}</span>
          </span>
        </div>
      );
    }

    // Personalized time-of-day greeting card. Replaces the previous
    // "fun fact" card with something warmer and more personal.
    // Uses the logged-in user's display name (set up by supabase-client.js
    // after login).
    var GreetingCard = function({ txs, view, year, monthIdx }) {
      const { useState, useEffect } = React;
      // Re-render every minute so the greeting shifts with the day
      // (e.g. from "Good morning" → "Good afternoon" at noon without
      // needing a page reload).
      const [, force] = useState(0);
      useEffect(() => {
        const id = setInterval(() => force(n => n+1), 60 * 1000);
        return () => clearInterval(id);
      }, []);

      const now = new Date();
      const h = now.getHours();
      const greeting = h < 5 ? 'Still up'
                     : h < 12 ? 'Good morning'
                     : h < 17 ? 'Good afternoon'
                     : h < 22 ? 'Good evening'
                     : 'Good evening';
      const name = window.__currentUser?.displayName || 'friend';

      // Compute a contextual stat to show below the greeting — keeps
      // it relevant to whatever the user is currently looking at.
      const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      let stat = null;
      if (view === 'month') {
        const prefix = year + '-' + String(monthIdx+1).padStart(2,'0');
        const monthTxs = txs.filter(t => t.date.startsWith(prefix));
        const monthExp = monthTxs.filter(t => t.type === 'Expenses').reduce((a,b)=>a+b.amount, 0);
        if (monthTxs.length > 0) {
          stat = `${monthTxs.length} transactions in ${MONTHS[monthIdx]} · ${fmt(monthExp)} spent`;
        } else {
          stat = `Nothing recorded in ${MONTHS[monthIdx]} yet`;
        }
      } else if (view === 'year') {
        const yearTxs = txs.filter(t => t.date.startsWith(year + '-'));
        const yearSav = yearTxs.filter(t => t.type === 'Savings').reduce((a,b)=>a+b.amount, 0);
        if (yearTxs.length > 0) {
          stat = `${yearTxs.length.toLocaleString()} transactions in ${year} · ${fmt(yearSav)} saved so far`;
        }
      } else {
        const totalSav = txs.filter(t => t.type === 'Savings').reduce((a,b)=>a+b.amount, 0);
        stat = `${txs.length.toLocaleString()} transactions all-time · ${fmt(totalSav)} saved`;
      }

      return (
        <div className="greeting-card">
          <div className="greeting-body">
            <div className="greeting-headline">
              <span className="greeting-text">{greeting}, </span>
              <span className="greeting-name">{name}</span>
            </div>
            {stat && <div className="greeting-stat">{stat}</div>}
          </div>
        </div>
      );
    }

    // FactCard — rotates through dozens of computed insights from the
    // transaction data. Each render picks a random fact, and users can
    // cycle to the next one with the arrow button. The bank of facts is
    // deliberately rich — historical records, category deep-dives, time
    // patterns, streaks, and couple-vs-couple comparisons.
    var FactCard = function({ txs }) {
      const { useMemo, useState, useEffect } = React;

      const facts = useMemo(() => {
        if (!txs.length) return [];
        const out = [];
        const inc = txs.filter(t => t.type === 'Income');
        const exp = txs.filter(t => t.type === 'Expenses');
        const sav = txs.filter(t => t.type === 'Savings');
        const totalInc = inc.reduce((a,b)=>a+b.amount, 0);
        const totalExp = exp.reduce((a,b)=>a+b.amount, 0);
        const totalSav = sav.reduce((a,b)=>a+b.amount, 0);

        const MONTHS_LONG = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

        // ============================================================
        // SECTION 1 — Grand totals and lifetime flow
        // ============================================================
        out.push({
          icon: '📋',
          title: 'Grand total',
          body: `You've logged ${txs.length.toLocaleString()} transactions, moving ${fmt(totalInc + totalExp + totalSav)} through this budget all-time.`
        });

        out.push({
          icon: '💵',
          title: 'Lifetime income',
          body: `You've earned ${fmt(totalInc)} since you started tracking.`
        });

        if (totalExp > 0) {
          out.push({
            icon: '💸',
            title: 'Lifetime spending',
            body: `You've spent ${fmt(totalExp)} across ${exp.length.toLocaleString()} expense transactions.`
          });
        }

        if (totalSav > 0) {
          out.push({
            icon: '🏦',
            title: 'Put away',
            body: `${fmt(totalSav)} has moved into savings and goals since you started tracking.`
          });
        }

        // Savings rate overall
        const sr = totalInc > 0 ? (totalInc - totalExp) / totalInc * 100 : 0;
        if (totalInc > 0) {
          out.push({
            icon: '📈',
            title: 'Lifetime savings rate',
            body: `Across everything you've tracked, ${sr.toFixed(0)}% of income didn't get spent. ${sr > 20 ? "That's a strong rate." : sr > 10 ? "That's a healthy rate." : "Every bit counts."}`
          });
        }

        // ============================================================
        // SECTION 2 — Records and superlatives
        // ============================================================
        const topTx = [...txs].sort((a,b)=>b.amount-a.amount)[0];
        if (topTx) {
          out.push({
            icon: '💎',
            title: 'Largest transaction',
            body: `Your biggest single entry: ${fmt(topTx.amount)} for ${topTx.category} on ${topTx.date}${topTx.details ? ' — ' + topTx.details : ''}.`
          });
        }

        const topExpTx = [...exp].sort((a,b)=>b.amount-a.amount)[0];
        if (topExpTx && topExpTx !== topTx) {
          out.push({
            icon: '🛒',
            title: 'Largest expense',
            body: `The most you've spent in one transaction: ${fmt(topExpTx.amount)} on ${topExpTx.category}${topExpTx.details ? ' (' + topExpTx.details + ')' : ''}.`
          });
        }

        const topIncTx = [...inc].sort((a,b)=>b.amount-a.amount)[0];
        if (topIncTx) {
          out.push({
            icon: '💰',
            title: 'Largest income',
            body: `Your biggest payday: ${fmt(topIncTx.amount)} on ${topIncTx.date}${topIncTx.details ? ' — ' + topIncTx.details : ''}.`
          });
        }

        // Smallest non-zero expense
        const smallExp = [...exp].filter(t => t.amount > 0).sort((a,b)=>a.amount-b.amount)[0];
        if (smallExp) {
          out.push({
            icon: '🪙',
            title: 'Smallest expense',
            body: `Your tiniest tracked expense: ${fmt(smallExp.amount)} for ${smallExp.category}${smallExp.details ? ' — ' + smallExp.details : ''}. Every cent counts.`
          });
        }

        // Oldest transaction
        const oldestTx = [...txs].sort((a,b)=>a.date.localeCompare(b.date))[0];
        if (oldestTx) {
          const d = new Date(oldestTx.date);
          const daysSince = Math.round((new Date() - d) / (1000*60*60*24));
          out.push({
            icon: '📜',
            title: 'Your origin story',
            body: `Your very first transaction: ${fmt(oldestTx.amount)} for ${oldestTx.category} on ${oldestTx.date}. That was ${daysSince.toLocaleString()} days ago.`
          });
        }

        // Most recent
        const newestTx = [...txs].sort((a,b)=>b.date.localeCompare(a.date))[0];
        if (newestTx) {
          out.push({
            icon: '📍',
            title: 'Most recent',
            body: `Latest entry: ${fmt(newestTx.amount)} for ${newestTx.category} on ${newestTx.date}.`
          });
        }

        // ============================================================
        // SECTION 3 — Category deep dives
        // ============================================================
        const expByCat = {};
        for (const t of exp) expByCat[t.category] = (expByCat[t.category]||0) + t.amount;
        const sortedExpCat = Object.entries(expByCat).sort((a,b)=>b[1]-a[1]);

        if (sortedExpCat[0]) {
          const [name, amt] = sortedExpCat[0];
          out.push({
            icon: '🏆',
            title: 'Top spending category',
            body: `${name} has cost you ${fmt(amt)} over the years — that's ${(amt/totalExp*100).toFixed(0)}% of everything you've spent.`
          });
        }

        if (sortedExpCat[1]) {
          const [name, amt] = sortedExpCat[1];
          out.push({
            icon: '🥈',
            title: 'Runner-up spending',
            body: `${name} is your second-highest expense category at ${fmt(amt)} all-time.`
          });
        }

        if (sortedExpCat[2]) {
          const [name, amt] = sortedExpCat[2];
          out.push({
            icon: '🥉',
            title: 'Bronze medalist',
            body: `${name} rounds out your top three spending categories with ${fmt(amt)}.`
          });
        }

        // Category you've used most frequently (by count)
        const catCounts = {};
        for (const t of txs) catCounts[t.category] = (catCounts[t.category]||0) + 1;
        const topCount = Object.entries(catCounts).sort((a,b)=>b[1]-a[1])[0];
        if (topCount) {
          out.push({
            icon: '🔁',
            title: 'Most frequent category',
            body: `${topCount[0]} shows up ${topCount[1].toLocaleString()} times — your most-logged category of all time.`
          });
        }

        // Average transaction size per top category
        if (sortedExpCat[0]) {
          const [name] = sortedExpCat[0];
          const catTxs = exp.filter(t => t.category === name);
          const avgAmt = catTxs.reduce((a,b)=>a+b.amount, 0) / catTxs.length;
          out.push({
            icon: '💳',
            title: `${name}, on average`,
            body: `Each ${name} transaction averages ${fmt(avgAmt)}, across ${catTxs.length} entries.`
          });
        }

        // Coffee / dining habit
        const coffeeCats = ['Starbucks', 'Coffee', 'Dining', 'Restaurants'];
        const coffeeTxs = exp.filter(t=>coffeeCats.includes(t.category));
        const coffeeTotal = coffeeTxs.reduce((a,b)=>a+b.amount, 0);
        if (coffeeTotal > 50) {
          out.push({
            icon: '☕',
            title: 'Small sips add up',
            body: `${fmt(coffeeTotal)} across ${coffeeTxs.length} coffee and dining trips. That's roughly ${fmt(coffeeTotal/coffeeTxs.length)} per outing.`
          });
        }

        // Grocery stats
        const groceryTxs = exp.filter(t => t.category === 'Groceries');
        if (groceryTxs.length > 10) {
          const groceryTotal = groceryTxs.reduce((a,b)=>a+b.amount, 0);
          out.push({
            icon: '🛒',
            title: 'Grocery habit',
            body: `${groceryTxs.length.toLocaleString()} grocery trips totaling ${fmt(groceryTotal)} — averaging ${fmt(groceryTotal/groceryTxs.length)} per run.`
          });
        }

        // Number of distinct categories used
        const uniqueCats = Object.keys(catCounts).length;
        out.push({
          icon: '🗂️',
          title: 'Diverse spending',
          body: `You've used ${uniqueCats} different categories to sort your money.`
        });

        // ============================================================
        // SECTION 4 — Monthly patterns
        // ============================================================
        const months = {};
        for (const t of txs) {
          const m = t.date.slice(0,7);
          if (!months[m]) months[m] = {inc:0, exp:0, sav:0, count:0};
          if (t.type === 'Income') months[m].inc += t.amount;
          else if (t.type === 'Expenses') months[m].exp += t.amount;
          else if (t.type === 'Savings') months[m].sav += t.amount;
          months[m].count++;
        }
        const monthArr = Object.entries(months).map(([m,v])=>({m, net: v.inc-v.exp, ...v}));

        // Best savings month
        const bestMonth = monthArr.filter(m=>m.inc>0).sort((a,b)=>b.net-a.net)[0];
        if (bestMonth && bestMonth.net > 0) {
          const [y, mo] = bestMonth.m.split('-');
          out.push({
            icon: '🌟',
            title: 'Best savings month',
            body: `${MONTHS_LONG[parseInt(mo)-1]} ${y} was your best — you kept ${fmt(bestMonth.net)} after expenses.`
          });
        }

        // Worst month
        const worstMonth = monthArr.filter(m=>m.inc>0 || m.exp>0).sort((a,b)=>a.net-b.net)[0];
        if (worstMonth && worstMonth.net < 0) {
          const [y, mo] = worstMonth.m.split('-');
          out.push({
            icon: '⚠️',
            title: 'Toughest month',
            body: `${MONTHS[parseInt(mo)-1]} ${y} was your roughest — expenses outpaced income by ${fmt(Math.abs(worstMonth.net))}.`
          });
        }

        // Highest income month
        const topIncMonth = monthArr.filter(m=>m.inc>0).sort((a,b)=>b.inc-a.inc)[0];
        if (topIncMonth) {
          const [y, mo] = topIncMonth.m.split('-');
          out.push({
            icon: '🎯',
            title: 'Highest earning month',
            body: `${MONTHS_LONG[parseInt(mo)-1]} ${y} brought in the most: ${fmt(topIncMonth.inc)}.`
          });
        }

        // Highest expense month
        const topExpMonth = monthArr.filter(m=>m.exp>0).sort((a,b)=>b.exp-a.exp)[0];
        if (topExpMonth) {
          const [y, mo] = topExpMonth.m.split('-');
          out.push({
            icon: '📊',
            title: 'Biggest spending month',
            body: `${MONTHS_LONG[parseInt(mo)-1]} ${y} was your highest-spending month at ${fmt(topExpMonth.exp)}.`
          });
        }

        // Monthly averages
        const activeMonths = monthArr.filter(m=>m.inc>0 || m.exp>0).length;
        if (activeMonths > 0) {
          out.push({
            icon: '📅',
            title: 'Monthly average',
            body: `You average ${fmt(totalInc/activeMonths)} in and ${fmt(totalExp/activeMonths)} out per month across ${activeMonths} tracked months.`
          });
          out.push({
            icon: '🧮',
            title: 'Transactions per month',
            body: `On average, you log ${(txs.length/activeMonths).toFixed(1)} transactions per month.`
          });
        }

        // ============================================================
        // SECTION 5 — Time-of-week and seasonal patterns
        // ============================================================
        const byDay = [0,0,0,0,0,0,0];
        const byDayCount = [0,0,0,0,0,0,0];
        for (const t of exp) {
          const d = new Date(t.date + 'T12:00:00').getDay();
          byDay[d] += t.amount;
          byDayCount[d]++;
        }
        const maxDaySpend = Math.max(...byDay);
        const maxDayIdx = byDay.indexOf(maxDaySpend);
        if (maxDaySpend > 0) {
          out.push({
            icon: '🗓️',
            title: 'Biggest spending day',
            body: `${DAYS[maxDayIdx]}s are your most expensive day of the week — ${fmt(maxDaySpend)} across ${byDayCount[maxDayIdx]} transactions historically.`
          });
        }
        const minDayIdx = byDayCount.map((c,i) => c > 0 ? byDay[i] : Infinity).indexOf(Math.min(...byDayCount.map((c,i) => c > 0 ? byDay[i] : Infinity)));
        if (byDayCount[minDayIdx] > 0) {
          out.push({
            icon: '😴',
            title: 'Quietest day',
            body: `${DAYS[minDayIdx]}s are your lowest-spending day — just ${fmt(byDay[minDayIdx])} over ${byDayCount[minDayIdx]} transactions.`
          });
        }

        // Weekend vs weekday
        const weekendExp = exp.filter(t => {
          const d = new Date(t.date + 'T12:00:00').getDay();
          return d === 0 || d === 6;
        }).reduce((a,b)=>a+b.amount, 0);
        const weekdayExp = totalExp - weekendExp;
        if (weekendExp > 0 && weekdayExp > 0) {
          const ratio = (weekendExp / totalExp * 100).toFixed(0);
          out.push({
            icon: '🎉',
            title: 'Weekend warriors',
            body: `${ratio}% of your spending happens on weekends — ${fmt(weekendExp)} on Saturdays and Sundays all-time.`
          });
        }

        // Most expensive month of the calendar year (seasonal)
        const byMonthOfYear = new Array(12).fill(0);
        for (const t of exp) {
          const mo = parseInt(t.date.slice(5,7)) - 1;
          byMonthOfYear[mo] += t.amount;
        }
        const maxSeasonIdx = byMonthOfYear.indexOf(Math.max(...byMonthOfYear));
        out.push({
          icon: '🎄',
          title: 'Pricey time of year',
          body: `${MONTHS_LONG[maxSeasonIdx]} tends to be your most expensive month — ${fmt(byMonthOfYear[maxSeasonIdx])} spent across all your ${MONTHS_LONG[maxSeasonIdx]}s combined.`
        });

        // ============================================================
        // SECTION 6 — Streaks and tracking dedication
        // ============================================================
        const dates = [...new Set(txs.map(t=>t.date))].sort();
        if (dates.length > 1) {
          const first = dates[0], last = dates[dates.length-1];
          const days = Math.round((new Date(last + 'T12:00:00') - new Date(first + 'T12:00:00')) / (1000*60*60*24));
          out.push({
            icon: '⏱️',
            title: 'Tracking dedication',
            body: `${days.toLocaleString()} days between your first and most recent transaction. ${days > 730 ? 'Over two years of consistent tracking.' : days > 365 ? 'More than a full year.' : 'Keep it up.'}`
          });

          // Unique tracking days
          out.push({
            icon: '✅',
            title: 'Days with activity',
            body: `${dates.length.toLocaleString()} unique days have at least one transaction logged. That's ${(dates.length/days*100).toFixed(0)}% of the time span covered.`
          });
        }

        // Longest streak of consecutive days with at least one transaction
        if (dates.length > 2) {
          let longest = 1, current = 1;
          for (let i = 1; i < dates.length; i++) {
            const d1 = new Date(dates[i-1] + 'T12:00:00');
            const d2 = new Date(dates[i] + 'T12:00:00');
            const diff = Math.round((d2 - d1) / (1000*60*60*24));
            if (diff === 1) { current++; longest = Math.max(longest, current); }
            else current = 1;
          }
          if (longest > 3) {
            out.push({
              icon: '🔥',
              title: 'Longest logging streak',
              body: `${longest} days in a row with at least one transaction logged. That's focus.`
            });
          }
        }

        // Busiest single day
        const byExactDate = {};
        for (const t of txs) byExactDate[t.date] = (byExactDate[t.date]||0) + 1;
        const busiestDate = Object.entries(byExactDate).sort((a,b)=>b[1]-a[1])[0];
        if (busiestDate && busiestDate[1] > 3) {
          out.push({
            icon: '📌',
            title: 'Busiest single day',
            body: `${busiestDate[0]} had ${busiestDate[1]} transactions logged — your most active day ever.`
          });
        }

        // ============================================================
        // SECTION 7 — Per-year reviews
        // ============================================================
        const years = {};
        for (const t of txs) {
          const y = t.date.slice(0,4);
          if (!years[y]) years[y] = {inc:0, exp:0, sav:0, count:0};
          if (t.type === 'Income') years[y].inc += t.amount;
          else if (t.type === 'Expenses') years[y].exp += t.amount;
          else if (t.type === 'Savings') years[y].sav += t.amount;
          years[y].count++;
        }
        const yearArr = Object.entries(years).map(([y,v]) => ({y, net: v.inc-v.exp, ...v}));

        // Best year
        const bestYear = [...yearArr].filter(y=>y.inc>0).sort((a,b)=>b.net-a.net)[0];
        if (bestYear && yearArr.length > 1) {
          out.push({
            icon: '🏅',
            title: 'Best financial year',
            body: `${bestYear.y} was your strongest year — ${fmt(bestYear.net)} kept after expenses.`
          });
        }

        // Most active year
        const mostActiveYear = [...yearArr].sort((a,b)=>b.count-a.count)[0];
        if (mostActiveYear) {
          out.push({
            icon: '📆',
            title: 'Busiest year',
            body: `${mostActiveYear.y} was your most active — ${mostActiveYear.count.toLocaleString()} transactions logged across the year.`
          });
        }

        // Year-over-year comparison (if we have multiple full years)
        if (yearArr.length >= 2) {
          const sorted = [...yearArr].sort((a,b) => a.y.localeCompare(b.y));
          const last = sorted[sorted.length-1];
          const prev = sorted[sorted.length-2];
          if (prev.exp > 0 && last.exp > 0) {
            const pct = ((last.exp - prev.exp) / prev.exp * 100);
            const verb = pct > 0 ? 'up' : 'down';
            out.push({
              icon: '📉',
              title: 'Year-over-year spending',
              body: `Your ${last.y} spending is ${verb} ${Math.abs(pct).toFixed(0)}% from ${prev.y} — ${fmt(Math.abs(last.exp - prev.exp))} ${pct > 0 ? 'more' : 'less'}.`
            });
          }
        }

        // ============================================================
        // SECTION 8 — Fun and unexpected patterns
        // ============================================================
        // Round number spots
        const roundTxs = txs.filter(t => t.amount % 1 === 0 && t.amount >= 10);
        if (roundTxs.length > 10) {
          out.push({
            icon: '🎯',
            title: 'Round numbers',
            body: `${roundTxs.length.toLocaleString()} of your transactions are for exactly a round dollar amount. You apparently like whole numbers.`
          });
        }

        // Highest single-day expense total
        const expByDate = {};
        for (const t of exp) expByDate[t.date] = (expByDate[t.date]||0) + t.amount;
        const splurgeDate = Object.entries(expByDate).sort((a,b)=>b[1]-a[1])[0];
        if (splurgeDate) {
          out.push({
            icon: '💥',
            title: 'Biggest single-day spending',
            body: `${splurgeDate[0]} saw ${fmt(splurgeDate[1])} in expenses in one day — your biggest spend day ever.`
          });
        }

        // Number of unique transaction descriptions
        const uniqueDetails = new Set(txs.filter(t=>t.details).map(t=>t.details.toLowerCase().trim())).size;
        if (uniqueDetails > 20) {
          out.push({
            icon: '🧾',
            title: 'Unique merchants',
            body: `${uniqueDetails.toLocaleString()} different transaction descriptions — you've shopped a lot of places.`
          });
        }

        // Median transaction amount
        const amounts = [...txs].map(t=>t.amount).sort((a,b)=>a-b);
        const median = amounts[Math.floor(amounts.length/2)];
        out.push({
          icon: '📏',
          title: 'Typical transaction',
          body: `Your median transaction is ${fmt(median)} — half your entries are above, half below.`
        });

        // Days since last expense
        if (newestTx) {
          const daysSinceLast = Math.round((new Date() - new Date(newestTx.date + 'T12:00:00')) / (1000*60*60*24));
          if (daysSinceLast >= 0 && daysSinceLast < 60) {
            const msg = daysSinceLast === 0 ? 'Your last transaction was logged today.' :
                        daysSinceLast === 1 ? 'Your last transaction was yesterday.' :
                        `${daysSinceLast} days since your most recent transaction.`;
            out.push({
              icon: '⏳',
              title: 'Recency',
              body: msg
            });
          }
        }

        // ============================================================
        // SECTION 9 — User-attribution facts (who logged more)
        // ============================================================
        const byUser = {};
        for (const t of txs) {
          // This only works if transactions have a created_by-derived name,
          // which they don't in the current app shape. Skip gracefully.
          const u = t.createdByName;
          if (u) byUser[u] = (byUser[u]||0) + 1;
        }
        const userEntries = Object.entries(byUser);
        if (userEntries.length > 1) {
          const [top, ...rest] = userEntries.sort((a,b)=>b[1]-a[1]);
          out.push({
            icon: '✍️',
            title: 'Who logs the most',
            body: `${top[0]} has logged ${top[1].toLocaleString()} transactions — the top contributor.`
          });
        }

        return out;
      }, [txs]);

      // State: which fact index is shown. Randomized on mount so each
      // visit feels fresh. Users can click "Another" to cycle manually.
      const [idx, setIdx] = useState(() => Math.floor(Math.random() * 999));

      // When txs change meaningfully (user adds a new transaction), pick
      // a new random fact to keep things fresh.
      useEffect(() => {
        if (facts.length > 0) {
          setIdx(i => i + 1);  // advance to next
        }
      }, [txs.length]);

      if (!facts.length) return null;
      const fact = facts[idx % facts.length];

      return (
        <div className="fact-card">
          <div className="fact-icon">{fact.icon}</div>
          <div className="fact-body">
            <div className="fact-title">Did you know · {fact.title}</div>
            <div className="fact-text">{fact.body}</div>
          </div>
          <button
            className="fact-cycle"
            onClick={() => setIdx(i => i + 1)}
            title="Show another fact"
            aria-label="Show another fact"
          >
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M21 12a9 9 0 1 1-3-6.7"/>
              <path d="M21 4v5h-5"/>
            </svg>
          </button>
        </div>
      );
    }

    // Subtle "last saved by X · 2 min ago" indicator that appears next
    // to the transaction count after any save. Hooks into window.__subscribeLastEdited
    // which is set up by supabase-client.js.
    var LastEditedBy = function() {
      const { useState, useEffect } = React;
      const [state, setState] = useState({ at: null, by: null });
      useEffect(() => {
        if (!window.__subscribeLastEdited) return;
        return window.__subscribeLastEdited(setState);
      }, []);
      if (!state.at) return null;
      const mins = Math.floor((Date.now() - state.at.getTime()) / 60000);
      const rel = mins < 1 ? 'just now'
                : mins === 1 ? '1 min ago'
                : mins < 60 ? mins + ' min ago'
                : mins < 120 ? '1 hr ago'
                : Math.floor(mins/60) + ' hr ago';
      return (
        <span style={{color:'var(--ink-3)', marginLeft: 8, opacity: 0.75}}>
          · saved by {state.by}, {rel}

    // FlowView — wraps the Sankey diagram with month context.

    // and renders the Sankey alongside summary stats and copy.
    var FlowView = function({ txs, monthIdx, year, setMonthIdx, setYear, years, fmt, period, setPeriod }) {
      const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const MONTHS_LONG = ['January','February','March','April','May','June','July','August','September','October','November','December'];

      // Filter transactions based on the active period
      let filtered, periodLabel;
      if (period === 'month') {
        const prefix = year + '-' + String(monthIdx+1).padStart(2,'0');
        filtered = txs.filter(t => t.date.startsWith(prefix));
        periodLabel = `${MONTHS_LONG[monthIdx]} ${year}`;
      } else if (period === 'year') {
        const prefix = year + '-';
        filtered = txs.filter(t => t.date.startsWith(prefix));
        periodLabel = `${year}`;
      } else {
        filtered = txs;
        periodLabel = 'All time';
      }

      // Group by category
      const grp = (type) => {
        const m = {};
        for (const t of filtered.filter(t => t.type === type)) {
          m[t.category] = (m[t.category] || 0) + t.amount;

        return Object.entries(m)
          .map(([name, amount]) => ({ name, amount, glyph: window.glyphFor ? window.glyphFor(name) : '' }))

      const income = grp('Income');
      const expenses = grp('Expenses');
      const savings = grp('Savings');
      const totalIn = income.reduce((a,b)=>a+b.amount, 0);
      const totalOut = expenses.reduce((a,b)=>a+b.amount, 0);

      return (
        <div className="card" style={{padding: '20px 22px'}}>

                Money flow · {periodLabel}

            <div style={{display: 'flex', gap: 24, fontSize: 13}}>
              <div style={{textAlign: 'right'}}>
                <div style={{color: 'var(--ink-3)', fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.06em'}}>In</div>
                <div className="num" style={{color: 'var(--sage-ink)', fontWeight: 600, fontSize: 16}}>{fmt(totalIn)}</div>
              </div>
              <div style={{textAlign: 'right'}}>
                <div style={{color: 'var(--ink-3)', fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.06em'}}>Spent</div>
                <div className="num" style={{color: 'var(--terra-ink)', fontWeight: 600, fontSize: 16}}>{fmt(totalOut)}</div>
              </div>
              <div style={{textAlign: 'right'}}>
                <div style={{color: 'var(--ink-3)', fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.06em'}}>Saved</div>
                <div className="num" style={{color: 'var(--blue-ink)', fontWeight: 600, fontSize: 16}}>{fmt(totalSav)}</div>
              </div>
              <div style={{textAlign: 'right'}}>
                <div style={{color: 'var(--ink-3)', fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.06em'}}>Leftover</div>
                <div className="num" style={{
                  color: leftover < 0 ? 'var(--terra-ink)' : 'var(--ink)',
                  fontWeight: 600, fontSize: 16
                }}>{fmt(leftover)}</div>
              </div>
            </div>
          </div>

          {/* Period switcher inside the Flow view */}
          <div style={{
            display: 'flex', gap: 8, alignItems: 'center', marginBottom: 16,
            padding: '8px 12px', background: 'var(--bg-soft)', borderRadius: 10,
            flexWrap: 'wrap'
          }}>
            <span style={{fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--ink-3)', fontWeight: 600, marginRight: 4}}>
              Period
            </span>
            <div className="seg">
              <button className={period==='month'?'on':''} onClick={()=>setPeriod('month')}>Month</button>
              <button className={period==='year'?'on':''} onClick={()=>setPeriod('year')}>Year</button>
              <button className={period==='all'?'on':''} onClick={()=>setPeriod('all')}>All time</button>
            </div>
            {period === 'month' && setMonthIdx && (
              <select className="select-month" value={monthIdx} onChange={e=>setMonthIdx(parseInt(e.target.value))}>
                {MONTHS_LONG.map((m,i) => <option key={i} value={i}>{m}</option>)}
              </select>

            {period !== 'all' && setYear && years && (
              <select className="select-year" value={year} onChange={e=>setYear(parseInt(e.target.value))}>
                {years.map(y => <option key={y} value={y}>{y}</option>)}

          </div>

          {/* Sankey: simplified version on phone, full version on
              tablet/desktop. CSS hides whichever is unused. */}
          <div className="sankey-desktop-only">
            <Sankey
              income={income}
              expenses={expenses}
              savings={savings}
              leftover={leftover}
              periodLabel={periodLabel}
            />
          </div>
          <div className="sankey-mobile-only">
            <MobileSankey
              income={income}
              expenses={expenses}
              savings={savings}
              leftover={leftover}
            />
          </div>

          <div style={{
            marginTop: 16, padding: '12px 16px',
            background: 'var(--bg-soft)', borderRadius: 10,
            fontSize: 12, color: 'var(--ink-3)',
            fontStyle: 'italic', fontFamily: "'Fraunces', serif"
          }}>
            Hover over any flow to see its amount. Income on the left → how it split → individual categories on the right.
          </div>
        </div>
      );
    }
    window.FlowView = FlowView;

    // ============================================================
    // NET WORTH
    // ============================================================
    // Group definitions — name, emoji, ordered list of group_keys to
    // pull from. Drives the section headers in NetWorthView.
    const NW_GROUPS = [
      { key: 'liquid',            label: 'Liquid Assets',          emoji: '💵', kind: 'asset' },
      { key: 'ira',               label: 'IRAs',                   emoji: '📈', kind: 'asset' },
      { key: 'retirement_yours',  label: 'Retirement · Cory',      emoji: '🏛️', kind: 'asset' },
      { key: 'retirement_wife',   label: 'Retirement · Britt',     emoji: '🏛️', kind: 'asset' },
      { key: 'retirement_old',    label: 'Old Employer Accounts',  emoji: '📦', kind: 'asset' },
      { key: 'family',            label: 'Cal',                    emoji: '👶', kind: 'asset' },
      { key: 'vehicle',           label: 'Vehicles',               emoji: '🚗', kind: 'asset' },
      { key: 'liability',         label: 'Liabilities',            emoji: '📉', kind: 'liability' }
    ];

    // BalanceUpdateModal — opened when the user clicks "Update" on an
    // account row. Shows the current balance, date, and a free-text
    // notes field. On submit, saves a new snapshot.
    var BalanceUpdateModal = function({ account, snapshots, onClose, onSave, onDeleteSnapshot }) {
      const { useState, useEffect, useRef } = React;
      if (!account) return null;
      const [balance, setBalance] = useState(account.current_balance != null ? String(account.current_balance) : '');
      const [date, setDate] = useState(new Date().toISOString().slice(0, 10));
      const [showHistory, setShowHistory] = useState(false);
      const inputRef = useRef(null);

      useEffect(() => {
        // Auto-focus and select the balance input
        const t = setTimeout(() => {
          inputRef.current?.focus();
          inputRef.current?.select();
        }, 50);
        return () => clearTimeout(t);
      }, []);

      useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };

        if (e) e.preventDefault();
        const num = parseFloat(balance);

      // Filter snapshots for this account, latest first

        .filter(s => s.account_id === account.id)
        .sort((a, b) => b.snapshot_date.localeCompare(a.snapshot_date));

      return (
        <div className="modal-back" onClick={onClose}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{width: 460}}>

              <h3 className="serif" style={{margin:0, fontSize: 20}}>{account.name}</h3>
              <button onClick={onClose} style={{color:'var(--ink-3)', fontSize:18}}>×</button>
            </div>
            {account.notes && (
              <div style={{fontSize: 12, color: 'var(--ink-3)', marginBottom: 14, fontStyle: 'italic'}}>
                {account.notes}
              </div>
            )}

            <form onSubmit={submit}>
              <div className="modal-row">
                <label>Balance</label>
                <input
                  ref={inputRef}
                  type="number"
                  step="0.01"

              <div className="modal-row">
                <label>As of date</label>
                <input
                  type="date"
                  value={date}
                  onChange={e=>setDate(e.target.value)}
                />

              <div className="modal-actions" style={{marginTop: 18}}>
