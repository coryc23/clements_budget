                <button type="submit" className="btn btn-primary">Save balance</button>
              </div>
            </form>

            {accountSnapshots.length > 0 && (
              <div style={{marginTop: 22, paddingTop: 18, borderTop: '1px solid var(--line)'}}>
                <button
                  type="button"
                  onClick={() => setShowHistory(v => !v)}
                  style={{
                    fontSize: 12, color: 'var(--ink-3)', textTransform: 'uppercase',
                    letterSpacing: '0.06em', fontWeight: 600, cursor: 'pointer'
                  }}
                >
                  {showHistory ? '▼' : '▶'} History ({accountSnapshots.length})
                </button>
                {showHistory && (
                  <div style={{marginTop: 10, maxHeight: 200, overflowY: 'auto'}}>
                    {accountSnapshots.map(s => (
                      <div key={s.id} style={{
                        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                        padding: '6px 0', borderBottom: '1px solid var(--line)',
                        fontSize: 13
                      }}>
                        <span style={{color: 'var(--ink-3)'}}>{s.snapshot_date}</span>
                        <span className="num" style={{fontWeight: 500}}>{fmt(s.balance)}</span>
                        <button
                          type="button"
                          onClick={() => {
                            if (confirm('Delete this snapshot? The current balance will fall back to the next most recent snapshot.')) {
                              onDeleteSnapshot({ snapshotId: s.id, accountId: account.id });
                            }
                          }}
                          style={{
                            color: 'var(--ink-3)', fontSize: 11,
                            padding: '2px 8px', cursor: 'pointer'
                          }}
                          title="Delete this snapshot"
                        >×</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }
    window.BalanceUpdateModal = BalanceUpdateModal;

    // Format "X days ago", "yesterday", "today" — used for the
    // "last updated" indicator on each account row.
    function timeSince(iso) {
      if (!iso) return 'never';
      const then = new Date(iso);
      const now = new Date();
      const days = Math.floor((now - then) / (1000 * 60 * 60 * 24));
      if (days < 1) return 'today';
      if (days === 1) return 'yesterday';
      if (days < 7) return `${days} days ago`;
      if (days < 30) return `${Math.floor(days/7)} weeks ago`;
      if (days < 365) return `${Math.floor(days/30)} months ago`;
      return `${Math.floor(days/365)}+ years ago`;
    }

    // Whether an account's balance is "stale" enough to warrant a nudge.
    // Different account types have different reasonable cadences.
    function staleDays(group_key) {
      if (group_key === 'vehicle') return 180;   // twice a year for cars
      if (group_key === 'liquid') return 30;     // monthly for cash
      return 60;                                  // ~bi-monthly default
    }
    function isStale(account) {
      if (!account.last_updated_at) return true;
      const days = (Date.now() - new Date(account.last_updated_at).getTime()) / (1000*60*60*24);
      return days > staleDays(account.group_key);
    }

    // NetWorthChart — interactive area chart for net worth over time.
    // Period chips (1M/3M/6M/1Y/All) zoom the time window. Hover or
    // tap-and-drag shows a vertical crosshair with a tooltip showing
    // the exact value, date, and change since the start of the window.
    // Designed to feel like the chart in Robinhood / Fidelity / Personal
    // Capital — familiar, focused, no clutter.
    var NetWorthChart = function({ snapshots, accounts, showExcludedOverlay, setShowExcludedOverlay, hasExcluded }) {
      const { useState, useMemo, useRef, useEffect } = React;
      // Selected time window. Defaults to '1Y' if there's at least
      // ~10 months of data, else 'All' so a new user sees everything.
      const earliestDate = useMemo(() => {
        if (snapshots.length === 0) return null;
        return [...snapshots].sort((a,b) => a.snapshot_date.localeCompare(b.snapshot_date))[0].snapshot_date;
      }, [snapshots]);
      const monthsOfData = useMemo(() => {
        if (!earliestDate) return 0;
        const start = new Date(earliestDate);
        const now = new Date();
        return (now.getFullYear() - start.getFullYear()) * 12 + (now.getMonth() - start.getMonth());
      }, [earliestDate]);
      const [period, setPeriod] = useState(monthsOfData >= 10 ? '1Y' : 'All');
      const [hoverIdx, setHoverIdx] = useState(null); // null = no hover
      const svgRef = useRef(null);

      // Build a monthly history series given a predicate that decides
      // whether to include each account. We compute two series:
      //   - primary: included accounts only (matches the headline)
      //   - overlay: all accounts (shown as comparison line on toggle)
      // Same algorithm both times; only the filter differs.
      const buildSeries = (includeFn) => {
        if (snapshots.length === 0) return [];
        const sorted = [...snapshots].sort((a, b) => a.snapshot_date.localeCompare(b.snapshot_date));
        const startDate = new Date(sorted[0].snapshot_date);
        const endDate = new Date();
        const months = [];
        let y = startDate.getFullYear(), m = startDate.getMonth();
        const endY = endDate.getFullYear(), endM = endDate.getMonth();
        while (y < endY || (y === endY && m <= endM)) {
          months.push({ y, m });
          m++; if (m > 11) { m = 0; y++; }
        }
        const result = [];
        for (const month of months) {
          const cutoff = new Date(month.y, month.m + 1, 0).toISOString().slice(0,10);
          const balances = new Map();
          for (const s of sorted) {
            if (s.snapshot_date > cutoff) break;
            balances.set(s.account_id, parseFloat(s.balance) || 0);
          }
          let net = 0;
          for (const [aid, bal] of balances) {
            const acct = accounts.find(a => a.id === aid);
            if (!acct) continue;
            if (!includeFn(acct)) continue;
            net += acct.kind === 'asset' ? bal : -bal;
          }
          const dateLabel = new Date(month.y, month.m, 1).toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
          result.push({ y: month.y, m: month.m, net, dateLabel });
        }
        return result;
      };
      // Primary series: included only (matches headline)
      const fullSeries = useMemo(() => buildSeries(a => !a.excluded), [snapshots, accounts]);
      // Overlay series: ALL accounts (only used when toggle is on)
      const fullSeriesAll = useMemo(() => buildSeries(() => true), [snapshots, accounts]);

      // Filter to the selected period. Period chips slice the END of
      // the series, so '1M' shows the most recent 1 month, etc.
      const series = useMemo(() => {
        if (period === 'All') return fullSeries;
        const monthsBack = { '1M': 1, '3M': 3, '6M': 6, '1Y': 12 }[period] || 12;
        // Keep monthsBack+1 points so we get a real "from" baseline
        return fullSeries.slice(-(monthsBack + 1));
      }, [fullSeries, period]);

      // Overlay series — same period filter, all-accounts version.
      // Only computed/used when the overlay toggle is on and there's
      // actually something excluded to compare against.
      const overlaySeries = useMemo(() => {
        if (!showExcludedOverlay || !hasExcluded) return [];
        if (period === 'All') return fullSeriesAll;
        const monthsBack = { '1M': 1, '3M': 3, '6M': 6, '1Y': 12 }[period] || 12;
        return fullSeriesAll.slice(-(monthsBack + 1));
      }, [fullSeriesAll, period, showExcludedOverlay, hasExcluded]);

      // Empty state — no data yet
      if (snapshots.length === 0) {
        return (
          <div style={{
            padding: '40px 20px', background: 'var(--bg-soft)',
            borderRadius: 12, textAlign: 'center', color: 'var(--ink-3)',
            fontSize: 14, fontStyle: 'italic', fontFamily: "'Fraunces', serif"
          }}>
            Your net worth chart will appear here once you've entered some balances.
          </div>
        );
      }

      // Single data point — show a flat line with a dot
      const onlyOnePoint = series.length < 2;

      // Chart geometry. SVG uses viewBox so it scales to its container.
      const W = 800, H = 280;
      const PAD = { top: 28, right: 16, bottom: 36, left: 56 };
      const innerW = W - PAD.left - PAD.right;
      const innerH = H - PAD.top - PAD.bottom;

      // Y-axis scale. Include overlay values in the min/max if the
      // overlay is being shown, so the chart fits both lines cleanly.
      const allValues = [...series.map(p => p.net), ...overlaySeries.map(p => p.net)];
      const minVal = Math.min(...allValues);
      const maxVal = Math.max(...allValues);
      const range = Math.max(1, maxVal - minVal);
      const yMin = minVal - range * 0.08;
      const yMax = maxVal + range * 0.08;
      const yScale = (v) => PAD.top + innerH * (1 - (v - yMin) / (yMax - yMin));
      const xScale = (i) => PAD.left + (series.length === 1 ? innerW / 2 : (innerW * i / (series.length - 1)));

      // Line path (primary — included only)
      const linePath = series.map((p, i) =>
        (i === 0 ? 'M' : 'L') + xScale(i) + ',' + yScale(p.net)
      ).join(' ');

      // Overlay line path (all accounts, including excluded)
      // Uses the same x-index, which is safe because both series cover
      // the same months (same source snapshots, just different filters).
      const overlayLinePath = overlaySeries.length >= 2
        ? overlaySeries.map((p, i) =>
            (i === 0 ? 'M' : 'L') + xScale(i) + ',' + yScale(p.net)
          ).join(' ')
        : '';

      // Area fill path (line + close down to bottom)
      const areaPath = onlyOnePoint
        ? ''
        : linePath +
          ` L${xScale(series.length-1)},${PAD.top + innerH}` +
          ` L${xScale(0)},${PAD.top + innerH} Z`;

      // Y-axis grid lines: 4 ticks, evenly spaced
      const yTicks = [];
      for (let i = 0; i <= 4; i++) {
        const v = yMin + (yMax - yMin) * (i / 4);
        yTicks.push({ v, y: PAD.top + innerH * (1 - i/4) });
      }

      // X-axis labels: show first, middle, last (or fewer if not enough points)
      const xLabels = [];
      if (series.length >= 1) xLabels.push({ i: 0, label: series[0].dateLabel });
      if (series.length >= 3) xLabels.push({ i: Math.floor((series.length-1)/2), label: series[Math.floor((series.length-1)/2)].dateLabel });
      if (series.length >= 2) xLabels.push({ i: series.length-1, label: series[series.length-1].dateLabel });

      // Hover handler — figure out which data point is closest to the
      // cursor's X position. Works for mouse and touch.
      const onPointerMove = (e) => {
        const svg = svgRef.current;
        if (!svg) return;
        const rect = svg.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        // Convert client X to SVG viewBox X
        const svgX = ((clientX - rect.left) / rect.width) * W;
        // Find closest point
        let bestIdx = 0;
        let bestDist = Infinity;
        for (let i = 0; i < series.length; i++) {
          const d = Math.abs(xScale(i) - svgX);
          if (d < bestDist) { bestDist = d; bestIdx = i; }
        }
        setHoverIdx(bestIdx);
      };
      const onPointerLeave = () => setHoverIdx(null);

      // Compute change from start of visible window to current
      const startVal = series[0].net;
      const endVal = series[series.length - 1].net;
      const changeAbs = endVal - startVal;
      const changePct = startVal !== 0 ? (changeAbs / Math.abs(startVal)) * 100 : 0;
      const changePos = changeAbs >= 0;

      // Tooltip data (shown either at hover position or at the end)
      const tipIdx = hoverIdx != null ? hoverIdx : series.length - 1;
      const tip = series[tipIdx];
      const tipPrev = tipIdx > 0 ? series[tipIdx - 1] : null;
      const tipChange = tipPrev ? tip.net - tipPrev.net : null;

      const periods = ['1M', '3M', '6M', '1Y', 'All'];

      return (
        <div style={{marginTop: 18}}>
          {/* Controls row: overlay toggle on left (only when relevant),
              period chips on right. */}
          <div style={{
            display: 'flex', gap: 4, marginBottom: 14,
            justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap'
          }}>
            {hasExcluded ? (
              <button
                onClick={() => setShowExcludedOverlay?.(!showExcludedOverlay)}
                style={{
                  display: 'inline-flex', alignItems: 'center', gap: 6,
                  padding: '5px 10px',
                  fontSize: 11, fontWeight: 500,
                  borderRadius: 999,
                  background: showExcludedOverlay ? 'var(--bg-soft)' : 'transparent',
                  color: 'var(--ink-3)',
                  border: '1px solid var(--line)',
                  transition: 'all 0.15s'
                }}
                title={showExcludedOverlay ? 'Hide overlay' : 'Show all-accounts comparison'}
              >
                <span style={{
                  display: 'inline-block', width: 18, height: 2,
                  background: showExcludedOverlay ? 'var(--sage)' : 'var(--ink-3)',
                  opacity: showExcludedOverlay ? 0.5 : 0.4,
                  borderRadius: 2
                }}/>
                {showExcludedOverlay ? 'Hide hidden' : 'Show hidden'}
              </button>
            ) : <span/>}
            <div style={{display: 'flex', gap: 4, flexWrap: 'wrap'}}>
              {periods.map(p => (
                <button
                  key={p}
                  onClick={() => { setPeriod(p); setHoverIdx(null); }}
                  style={{
                    padding: '5px 12px',
                    fontSize: 12, fontWeight: 600,
                    borderRadius: 999,
                    background: period === p ? 'var(--ink)' : 'transparent',
                    color: period === p ? 'var(--bg)' : 'var(--ink-3)',
                    border: period === p ? '1px solid var(--ink)' : '1px solid var(--line)',
                    transition: 'all 0.15s',
                    letterSpacing: '0.02em'
                  }}
                >{p}</button>
              ))}
            </div>
          </div>

          {/* Chart */}
          <div style={{position: 'relative'}}>
            <svg
              ref={svgRef}
              viewBox={`0 0 ${W} ${H}`}
              preserveAspectRatio="none"
              style={{width: '100%', height: 280, display: 'block', cursor: 'crosshair', touchAction: 'none'}}
              onMouseMove={onPointerMove}
              onMouseLeave={onPointerLeave}
              onTouchStart={onPointerMove}
              onTouchMove={onPointerMove}
              onTouchEnd={onPointerLeave}
            >
              <defs>
                <linearGradient id="nw-area-fill" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="var(--sage)" stopOpacity="0.35"/>
                  <stop offset="100%" stopColor="var(--sage)" stopOpacity="0"/>
                </linearGradient>
              </defs>

              {/* Y-axis grid lines + labels */}
              {yTicks.map((t, i) => (
                <g key={i}>
                  <line
                    x1={PAD.left} y1={t.y}
                    x2={W - PAD.right} y2={t.y}
                    stroke="var(--line)" strokeWidth="1"
                    strokeDasharray={i === 0 || i === yTicks.length-1 ? '' : '3 4'}
                    opacity="0.6"
                  />
                  <text
                    x={PAD.left - 8} y={t.y + 4}
                    textAnchor="end"
                    fontSize="11"
                    fontFamily="JetBrains Mono, monospace"
                    fill="var(--ink-3)"
                  >
                    {t.v >= 1000 ? '$' + Math.round(t.v/1000) + 'K' : '$' + Math.round(t.v)}
                  </text>
                </g>
              ))}

              {/* X-axis labels */}
              {xLabels.map((xl, i) => (
                <text
                  key={i}
                  x={xScale(xl.i)}
                  y={H - PAD.bottom + 22}
                  textAnchor={i === 0 ? 'start' : i === xLabels.length-1 ? 'end' : 'middle'}
                  fontSize="11"
                  fill="var(--ink-3)"
                  fontFamily="Inter, sans-serif"
                >{xl.label}</text>
              ))}

              {/* Area fill */}
              {!onlyOnePoint && (
                <path d={areaPath} fill="url(#nw-area-fill)"/>
              )}

              {/* Comparison overlay line — shown only when toggle is on
                  AND something is excluded. Drawn FIRST (behind primary
                  line) in a lighter sage so the primary stays prominent. */}
              {showExcludedOverlay && overlayLinePath && (
                <path
                  d={overlayLinePath}
                  fill="none"
                  stroke="var(--sage)"
                  strokeWidth="1.75"
                  strokeLinejoin="round"
                  strokeLinecap="round"
                  strokeDasharray="5 4"
                  opacity="0.7"
                />
              )}

              {/* The primary line (included accounts only) */}
              <path
                d={linePath}
                fill="none"
                stroke="var(--sage-ink)"
                strokeWidth="2.25"
                strokeLinejoin="round"
                strokeLinecap="round"
              />

              {/* Single-point marker (when only one data point) */}
              {onlyOnePoint && (
                <circle cx={xScale(0)} cy={yScale(series[0].net)} r="5" fill="var(--sage-ink)"/>
              )}

              {/* Hover crosshair + dot */}
              {hoverIdx != null && (
                <g>
                  <line
                    x1={xScale(hoverIdx)} y1={PAD.top}
                    x2={xScale(hoverIdx)} y2={PAD.top + innerH}
                    stroke="var(--ink-3)" strokeWidth="1" strokeDasharray="3 4"
                    opacity="0.6"
                  />
                  <circle
                    cx={xScale(hoverIdx)}
                    cy={yScale(series[hoverIdx].net)}
                    r="5"
                    fill="var(--bg-elev)"
                    stroke="var(--sage-ink)"
                    strokeWidth="2.5"
                  />
                </g>
              )}
            </svg>

            {/* Tooltip — positioned above the chart, follows the hover */}
            <div style={{
              position: 'absolute',
              top: 0, left: 0, right: 0,
              pointerEvents: 'none',
              padding: '0 16px',
              fontSize: 12,
              color: 'var(--ink-2)',
              fontFamily: "'JetBrains Mono', monospace",
              display: 'flex',
              justifyContent: 'space-between',
              gap: 16
            }}>
              <span>
                <span style={{color: 'var(--ink-3)'}}>{tip.dateLabel}</span>
                <span style={{marginLeft: 10, color: 'var(--ink)', fontWeight: 600}}>{fmt(tip.net)}</span>
              </span>
              {tipChange !== null && (
                <span style={{color: tipChange >= 0 ? 'var(--sage-ink)' : 'var(--terra-ink)', fontWeight: 600}}>
                  {tipChange >= 0 ? '↑' : '↓'} {fmt(Math.abs(tipChange))}
                </span>
              )}
            </div>
          </div>

          {/* Period summary footer */}
          <div style={{
            marginTop: 14, padding: '12px 14px',
            background: 'var(--bg-soft)', borderRadius: 10,
            display: 'flex', justifyContent: 'space-between', alignItems: 'center',
            flexWrap: 'wrap', gap: 8,
            fontSize: 12
          }}>
            <span style={{color: 'var(--ink-3)'}}>
              <span className="num" style={{color: 'var(--ink-2)'}}>{fmt(startVal)}</span>
              <span style={{margin: '0 6px'}}>·</span>
              <span style={{fontStyle: 'italic'}}>{series[0].dateLabel}</span>
              <span style={{margin: '0 8px', color: 'var(--ink-3)'}}>→</span>
              <span className="num" style={{color: 'var(--ink)'}}>{fmt(endVal)}</span>
              <span style={{margin: '0 6px'}}>·</span>
              <span style={{fontStyle: 'italic'}}>today</span>
            </span>
            {!onlyOnePoint && (
              <span style={{
                fontFamily: "'JetBrains Mono', monospace",
                fontWeight: 600,
                color: changePos ? 'var(--sage-ink)' : 'var(--terra-ink)'
              }}>
                {changePos ? '+' : '−'}{fmt(Math.abs(changeAbs))}
                <span style={{marginLeft: 6, opacity: 0.75, fontSize: 11}}>
                  ({changePos ? '+' : ''}{changePct.toFixed(1)}%)
                </span>
              </span>
            )}
          </div>
        </div>
      );
    }
    window.NetWorthChart = NetWorthChart;

    // NetWorthView — full Net Worth page. Shows total + history chart,
    // then a list of account groups, each with their accounts and
    // current balances.
    var NetWorthView = function({ accounts, snapshots, onUpdateBalance, onDeleteSnapshot, onSetExcluded }) {
      const { useState, useMemo } = React;
      const [editingAccount, setEditingAccount] = useState(null);
      // Toggle in the chart to show what's currently being excluded
      // (as a lighter comparison line). Only meaningful when at least
      // one account is excluded — UI hides it otherwise.
      const [showExcludedOverlay, setShowExcludedOverlay] = useState(false);

      // Compute totals — split into included vs excluded so we can
      // show both the "real" net worth (included only) and how much
      // is being hidden.
      const totals = useMemo(() => {
        let assets = 0, liabilities = 0;
        let excludedAssets = 0, excludedLiabilities = 0;
        let excludedCount = 0;
        for (const a of accounts) {
          const bal = parseFloat(a.current_balance) || 0;
          if (a.excluded) {
            excludedCount++;
            if (a.kind === 'asset') excludedAssets += bal;
            else excludedLiabilities += bal;
          } else {
            if (a.kind === 'asset') assets += bal;
            else liabilities += bal;
          }
        }
        return {
          assets, liabilities,
          net: assets - liabilities,
          excludedAssets, excludedLiabilities,
          excludedNet: excludedAssets - excludedLiabilities,
          excludedCount
        };
      }, [accounts]);

      // Group totals (included only) — used for group-level subtotal
      // display. Excluded accounts in the group don't add to this.
      const groupTotals = useMemo(() => {
        const m = {};
        for (const g of NW_GROUPS) m[g.key] = 0;
        for (const a of accounts) {
          if (a.excluded) continue;
          if (m[a.group_key] !== undefined) {
            m[a.group_key] += parseFloat(a.current_balance) || 0;
          }
        }
        return m;
      }, [accounts]);

      // Build net worth time series from snapshots.
      // Now respects exclusions: snapshots for excluded accounts are
      // ignored in the main series. Strategy: sample every month; for
      // each month, take the most recent balance for each INCLUDED
      // account as of that month's end.
      const history = useMemo(() => {
        if (snapshots.length === 0) return [];
        const sorted = [...snapshots].sort((a, b) => a.snapshot_date.localeCompare(b.snapshot_date));
        const startDate = new Date(sorted[0].snapshot_date);
        const endDate = new Date();
        const months = [];
        let y = startDate.getFullYear(), m = startDate.getMonth();
        const endY = endDate.getFullYear(), endM = endDate.getMonth();
        while (y < endY || (y === endY && m <= endM)) {
          months.push({ y, m, label: y + '-' + String(m+1).padStart(2,'0') });
          m++; if (m > 11) { m = 0; y++; }
        }
        const result = [];
        for (const month of months) {
          const cutoff = new Date(month.y, month.m + 1, 0).toISOString().slice(0,10);
          const balances = new Map();
          for (const s of sorted) {
            if (s.snapshot_date > cutoff) break;
            balances.set(s.account_id, parseFloat(s.balance) || 0);
          }
          let net = 0;
          for (const [aid, bal] of balances) {
            const acct = accounts.find(a => a.id === aid);
            if (!acct) continue;
            if (acct.excluded) continue;  // ← key change: skip excluded
            net += acct.kind === 'asset' ? bal : -bal;
          }
          result.push({ label: month.label, net });
        }
        return result;
      }, [snapshots, accounts]);

      // Change since last month (most recent vs second-most-recent in history)
      const changeFromLast = (history.length >= 2)
        ? history[history.length-1].net - history[history.length-2].net
        : null;

      // Total snapshot count across all accounts (for the "no data yet" check)
      const hasAnyData = snapshots.length > 0;

      return (
        <div className="card" style={{padding: '24px 26px'}}>
          {/* Big headline — full width, no side chart */}
          <div style={{marginBottom: 4}}>
            <div style={{fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--ink-3)', fontWeight: 600, marginBottom: 6}}>
              Total net worth
            </div>
            <div style={{fontSize: 42, fontFamily: "'Fraunces', serif", fontWeight: 500, color: 'var(--ink)', lineHeight: 1, letterSpacing: '-0.02em'}}>
              {fmt(totals.net)}
            </div>
            <div style={{fontSize: 13, color: 'var(--ink-3)', marginTop: 8, fontFamily: "'Fraunces', serif", fontStyle: 'italic'}}>
              {fmt(totals.assets)} in assets · {fmt(totals.liabilities)} in debt
              {changeFromLast !== null && (
                <span style={{marginLeft: 12, color: changeFromLast >= 0 ? 'var(--sage-ink)' : 'var(--terra-ink)', fontStyle: 'normal'}}>
                  {changeFromLast >= 0 ? '↑' : '↓'} {fmt(Math.abs(changeFromLast))} this month
                </span>
              )}
            </div>
            {totals.excludedCount > 0 && (
              <div style={{
                fontSize: 12, color: 'var(--ink-3)', marginTop: 6,
                fontStyle: 'italic', opacity: 0.85
              }}>
                Hidden: {fmt(totals.excludedNet)} across {totals.excludedCount} {totals.excludedCount === 1 ? 'account' : 'accounts'}
              </div>
            )}
          </div>

          {/* Big interactive chart — replaces the previous small Spark.
              Always renders; handles its own empty state internally.
              Receives `accounts` so it can apply exclusions internally,
              and gets an external "show overlay" prop driven by the
              toggle below it (when there's anything to overlay). */}
          <NetWorthChart
            snapshots={snapshots}
            accounts={accounts}
            showExcludedOverlay={showExcludedOverlay}
            setShowExcludedOverlay={setShowExcludedOverlay}
            hasExcluded={totals.excludedCount > 0}
          />

          {!hasAnyData && (
            <div style={{
              padding: '20px 22px', background: 'var(--bg-soft)', borderRadius: 12,
              marginBottom: 22, fontSize: 14, color: 'var(--ink-2)', lineHeight: 1.6
            }}>
              <div style={{fontFamily: "'Fraunces', serif", fontStyle: 'italic', fontSize: 16, marginBottom: 6}}>
                Let's get a snapshot of where you are right now.
              </div>
              Click <strong>Update</strong> on each account below and enter the current balance.
              You don't have to do them all at once — start with what you know.
              The chart above will start filling in once you've made a few monthly updates.
            </div>
          )}

          {/* Group cards.
              Each group has an eye-icon toggle in the header that
              toggles all its accounts. Each row has its own eye toggle.
              Excluded accounts/groups stay visible but are dimmed to
              signal they don't count toward net worth. */}
          <div style={{display: 'flex', flexDirection: 'column', gap: 16}}>
            {NW_GROUPS.map(g => {
              const accts = accounts.filter(a => a.group_key === g.key)
                .sort((a, b) => a.sort_order - b.sort_order);
              if (accts.length === 0) return null;
              const total = groupTotals[g.key];
              const allExcluded = accts.every(a => a.excluded);
              const someExcluded = accts.some(a => a.excluded);
              // Click the group eye: if ANY are included, exclude all.
              // If ALL are excluded, include all. (Matches "the group is
              // visible, click to hide" intuition.)
              const toggleGroup = () => {
                const target = !accts.every(a => a.excluded);
                for (const a of accts) {
                  if (!!a.excluded !== target) {
                    onSetExcluded?.({ accountId: a.id, excluded: target });
                  }
                }
              };
              // Visual: when all are excluded, dim the whole card.
              // When some are excluded, keep card normal (mixed state).
              const groupOpacity = allExcluded ? 0.55 : 1;

              return (
                <div key={g.key} style={{
                  border: '1px solid var(--line)', borderRadius: 14,
                  background: 'var(--bg-elev)', overflow: 'hidden',
                  opacity: groupOpacity,
                  transition: 'opacity 0.2s'
                }}>
                  <div style={{
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                    padding: '14px 20px', background: 'var(--bg-soft)',
                    borderBottom: '1px solid var(--line)'
                  }}>
                    <div style={{display: 'flex', alignItems: 'center', gap: 10}}>
                      <span style={{fontSize: 18}}>{g.emoji}</span>
                      <span style={{fontFamily: "'Fraunces', serif", fontSize: 16, fontWeight: 500, color: 'var(--ink)'}}>
                        {g.label}
                      </span>
                      {someExcluded && !allExcluded && (
                        <span style={{
                          fontSize: 10, color: 'var(--ink-3)', fontStyle: 'italic',
                          marginLeft: 4
                        }}>
                          (some hidden)
                        </span>
                      )}
                    </div>
                    <div style={{display: 'flex', alignItems: 'center', gap: 12}}>
                      <span className="num" style={{
                        fontSize: 16, fontWeight: 600,
                        color: g.kind === 'liability' ? 'var(--terra-ink)' : 'var(--ink)',
                        fontStyle: allExcluded ? 'italic' : 'normal'
                      }}>
                        {g.kind === 'liability' ? '−' : ''}{fmt(allExcluded ? 0 : total)}
                      </span>
                      {/* Group-level eye toggle */}
                      <button
                        onClick={toggleGroup}
                        title={allExcluded ? 'Show all in this group' : 'Hide all in this group'}
                        aria-label={allExcluded ? 'Show all' : 'Hide all'}
                        style={{
                          padding: 6, lineHeight: 0, borderRadius: 6,
                          color: allExcluded ? 'var(--ink-3)' : 'var(--ink-2)',
                          opacity: someExcluded && !allExcluded ? 0.7 : 1,
                          cursor: 'pointer'
                        }}
                      >
                        {allExcluded ? (
                          /* Eye-slash icon */
                          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                          </svg>
                        ) : (
                          /* Eye-open icon */
                          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                          </svg>
                        )}
                      </button>
                    </div>
                  </div>
                  <div>
                    {accts.map(a => {
                      const isExcluded = !!a.excluded;
                      return (
                        <div key={a.id} style={{
                          display: 'grid',
                          gridTemplateColumns: '1fr auto auto auto',
                          gap: 12, alignItems: 'center',
                          padding: '12px 20px',
                          borderBottom: '1px solid var(--line)',
                          opacity: isExcluded ? 0.55 : 1,
                          transition: 'opacity 0.2s'
                        }}>
                          <div>
                            <div style={{
                              fontWeight: 500, fontSize: 14,
                              color: 'var(--ink)',
                              fontStyle: isExcluded ? 'italic' : 'normal'
                            }}>{a.name}</div>
                            <div style={{fontSize: 11, color: 'var(--ink-3)', marginTop: 2, display: 'flex', alignItems: 'center', gap: 8}}>
                              <span>Updated {timeSince(a.last_updated_at)}</span>
                              {isStale(a) && a.current_balance > 0 && !isExcluded && (
                                <span style={{color: 'var(--amber-ink)', fontWeight: 500}}>· stale</span>
                              )}
                              {isExcluded && (
                                <span style={{color: 'var(--ink-3)', fontWeight: 500, fontStyle: 'italic'}}>
                                  · hidden
                                </span>
                              )}
                              {a.notes && <span style={{fontStyle: 'italic'}}>· {a.notes}</span>}
                            </div>
                          </div>
                          <div className="num" style={{
                            fontSize: 15, fontWeight: 500,
                            color: a.current_balance > 0 ? 'var(--ink)' : 'var(--ink-3)',
                            fontStyle: isExcluded ? 'italic' : 'normal'
                          }}>
                            {fmt(parseFloat(a.current_balance) || 0)}
                          </div>
                          {/* Per-account eye toggle */}
                          <button
                            onClick={() => onSetExcluded?.({ accountId: a.id, excluded: !isExcluded })}
