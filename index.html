        const latestYear = Math.max(...txs.map(t => parseInt(t.date.slice(0,4))).filter(y=>!isNaN(y)), YEAR);
        const inYear = txs.filter(t => parseInt(t.date.slice(0,4)) === latestYear);
        const latestMonth = inYear.length === 0 ? 0
          : Math.max(...inYear.map(t => parseInt(t.date.slice(5,7))-1));
        return lv('monthIdx', latestMonth, v =>
          typeof v === 'number' && v >= 0 && v <= 11
        );
      });
      const [view, setView] = useState(() =>
        lv('view', 'month', v => ['month','year','all','flow','networth','review'].includes(v))
      );
      const [flowPeriod, setFlowPeriod] = useState(() =>
        lv('flowPeriod', 'month', v => ['month','year','all'].includes(v))
      );
      // Effective view for stats computations. When the user is on the
      // Flow tab, the hero stats should reflect the period selected
      // within Flow (Month/Year/All time), not the literal 'flow' string.
      const statsView = view === 'flow' ? flowPeriod : view;
      const [tab, setTab] = useState(() =>
        lv('tab', 'all', v => ['all','Income','Expenses','Savings'].includes(v))
      );

      // Derived: budget rows for the currently-selected year (stable type order: Income → Expenses → Savings)
      const budgetRows = useMemo(() => {
        const block = blockFor(year);
        const mk = (rows, type) => rows.map((r, i) => ({
          key: type + '-' + i,
          name: r.name,
          type,
          color: colorFor(r.name, type),
          glyph: glyphFor(r.name),
          tag: tagFor(r.months),
          months: r.months.slice()
        }));
        return [
          ...mk(block.income,   'Income'),
          ...mk(block.expenses, 'Expenses'),
          ...mk(block.savings,  'Savings')
        ];
      }, [budgetsByYear, year]);
      const [modalOpen, setModalOpen] = useState(false);
      // When set, the TxModal opens in "edit" mode for this transaction.
      // Null = add mode.
      const [editingTx, setEditingTx] = useState(null);
      // When the fast-entry bar has a partial parse, it stuffs the
      // partial values here and opens the full modal so the user can
      // finish. Cleared when the modal closes.
      const [cmdPrefill, setCmdPrefill] = useState(null);
      // Smart defaults for the Add modal — remember what you used last
      // in this session so the next entry pre-fills correctly.
      // Resets on reload (which is what you asked for — per-session).
      const [lastUsed, setLastUsed] = useState({
        date: null,       // last date entered (for batch entry)
        type: null,       // last type used
        category: null    // last category used
      });
      // Fast-entry command bar: opened by pressing /
      const [cmdOpen, setCmdOpen] = useState(false);

      // Month closeouts: list of {year, month, closed_at} the current
      // user has closed out. Loaded once on mount, updated locally as
      // we close/reopen.
      const [closeouts, setCloseouts] = useState([]);
      // Celebration modal state. When set to a summary object, the
      // modal opens with that data.
      const [celebration, setCelebration] = useState(null);
      // Confirm-dialog state. Set to { title, message, onConfirm } to show;
      // null to hide.
      const [confirmState, setConfirmState] = useState(null);
      // Net worth tracking — accounts (current balances) + snapshot
      // history. Both are shared household-wide and synced via realtime.
      const [accounts, setAccounts] = useState([]);
      const [snapshots, setSnapshots] = useState([]);

      // Stable ref so the bridge handlers (which run outside React's
      // render lifecycle) can access the latest state. Kept up to date
      // on every render via direct mutation. NOTE: this MUST come after
      // all the state declarations above — referencing them earlier
      // throws a ReferenceError due to the temporal dead zone.
      const bridgeRef = React.useRef({});
      bridgeRef.current = { closeouts, txs, budgetsByYear, year, monthIdx };

      useEffect(() => {
        window.__reactBridge = {
          setTxs,
          setBudgetsByYear,
          extendCategoryLists: (type, name) => {
            if (type === 'Income'   && !INCOME_CATS.includes(name))  INCOME_CATS.push(name);
            if (type === 'Expenses' && !EXPENSE_CATS.includes(name)) EXPENSE_CATS.push(name);
            if (type === 'Savings'  && !SAVINGS_CATS.includes(name)) SAVINGS_CATS.push(name);
          },
          // Called by supabase-client when the OTHER user closes out a
          // month. Adds it to local state and fires the celebration on
          // this session so both screens see it.
          applyCloseoutInsert: ({ year, month, closed_at, closed_by, closed_by_name, isRemote }) => {
            const mIdx = month - 1;
            setCloseouts(prev => {
              if (prev.some(c => c.year === year && c.month === month)) return prev;
              return [...prev, { year, month, closed_at, closed_by }];
            });
            if (isRemote) {
              // Use the ref to access fresh txs/budgets/closeouts state
              const summary = buildSummaryFromRef(year, mIdx, bridgeRef.current);
              if (closed_by_name) summary.triggeredBy = closed_by_name;
              setCelebration(summary);
            }
          },
          applyCloseoutDelete: ({ year, month }) => {
            setCloseouts(prev => prev.filter(c => !(c.year === year && c.month === month)));
          },
          // Net worth realtime hooks
          applyAccountUpdate: (row) => {
            setAccounts(prev => prev.map(a => a.id === row.id ? { ...a, ...row } : a));
          },
          applySnapshotInsert: (row) => {
            setSnapshots(prev => {
              if (prev.some(s => s.id === row.id)) return prev;
              return [...prev, row];
            });
          },
          applySnapshotDelete: ({ id }) => {
            setSnapshots(prev => prev.filter(s => s.id !== id));
          }
        };
        if (window.__onReactReady) window.__onReactReady();
        return () => { window.__reactBridge = null; };
      }, []);

      // Load closeouts on mount (once we have a SupaStore)
      useEffect(() => {
        if (window.__SupaStore?.listCloseouts) {
          window.__SupaStore.listCloseouts().then(rows => {
            setCloseouts(rows || []);
          });
        }
      }, []);

      // Load accounts + snapshots on mount
      useEffect(() => {
        if (!window.__SupaStore) return;
        if (window.__SupaStore.listAccounts) {
          window.__SupaStore.listAccounts().then(rows => setAccounts(rows || []));
        }
        if (window.__SupaStore.listSnapshots) {
          window.__SupaStore.listSnapshots().then(rows => setSnapshots(rows || []));
        }
      }, []);

      // Persist the last-viewed page whenever it changes. Saves to
      // localStorage instantly + Supabase (debounced 1.5s inside the
      // helper) so refreshes restore exactly what you were looking at,
      // and other devices catch up shortly after.
      useEffect(() => {
        if (!window.__saveLastView) return;
        window.__saveLastView({
          view, monthIdx, year, tab, flowPeriod
        });
      }, [view, monthIdx, year, tab, flowPeriod]);
      // Initialize theme from (in priority order):
      //   1. Supabase profile (set by supabase-client.js on login)
      //   2. localStorage (set by the preload script in index.html head)
      //   3. TWEAK_DEFAULTS (the hard-coded fallback)
      // This keeps theme consistent across devices while painting the
      // right theme on the very first render.
      const [tweaks, setTweaks] = useState(() => {
        const userTheme = window.__currentUser?.theme;
        let localTheme = null;
        try { localTheme = localStorage.getItem('clements-budget-theme'); } catch(e) {}
        return {
          ...TWEAK_DEFAULTS,
          theme: userTheme || localTheme || TWEAK_DEFAULTS.theme
        };
      });
      const [tweaksOpen, setTweaksOpen] = useState(false);
      const [txFilter, setTxFilter] = useState({q: '', type: 'all', month: 'current'});
      const [addingTo, setAddingTo] = useState(null); // 'Income' | 'Expenses' | 'Savings' | null
      const [newCatName, setNewCatName] = useState('');
      const [txLimit, setTxLimit] = useState(200);
      // Reset pagination when the filtered set changes
      useEffect(()=>{ setTxLimit(200); }, [txFilter, view, monthIdx, year]);
      const [showHiddenFor, setShowHiddenFor] = useState(() => new Set()); // group keys where hidden rows are revealed
      const toggleShownFor = (k) => setShowHiddenFor(prev => {
        const next = new Set(prev);
        if (next.has(k)) next.delete(k); else next.add(k);
        return next;
      });

      useEffect(()=>{
        document.body.className = 'theme-' + tweaks.theme;
      }, [tweaks]);

      useEffect(()=>{
        const handler = (e) => {
          if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
          if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
        };
        window.addEventListener('message', handler);
        window.parent.postMessage({type: '__edit_mode_available'}, '*');
        return ()=>window.removeEventListener('message', handler);
      }, []);
      const setTweak = (k, v) => {
        const next = {...tweaks, [k]: v};
        setTweaks(next);
        window.parent.postMessage({type: '__edit_mode_set_keys', edits: {[k]: v}}, '*');
        // If the theme changed, persist it to both localStorage (instant,
        // per-device) and Supabase (cross-device). The save is fire-and-
        // forget: failures just mean it won't sync to other devices, but
        // the current session still works fine.
        if (k === 'theme' && window.__saveTheme) {
          window.__saveTheme(v);
        }
      };

      // categories list for modal
      const categoriesByType = useMemo(()=>{
        const out = { Income: [], Expenses: [], Savings: [] };
        for (const r of budgetRows) out[r.type].push(r.name);
        return out;
      }, [budgetRows]);

      // actuals per category based on current view (month / year / all)
      const actualsByCat = useMemo(()=>{
        const map = {};
        let prefix = null;
        if (statsView === 'month') prefix = year + '-' + String(monthIdx+1).padStart(2,'0');
        else if (statsView === 'year') prefix = year + '-';
        // statsView === 'all' → no prefix, include everything
        for (const t of txs) {
          if (prefix && !t.date.startsWith(prefix)) continue;
          const key = t.type + '|' + t.category;
          map[key] = (map[key] || 0) + t.amount;
        }
        return map;;
      }, [txs, monthIdx, year, statsView]);

      // attach actuals
      const decoratedRows = budgetRows.map(r => ({...r, actual: actualsByCat[r.type + '|' + r.name] || 0}));

      // Budget totals for the "all time" view — summed across EVERY year in budgetsByYear,
      // so each row shows its lifetime budget (not a simplistic single-year × N).
      const allTimeBudgetByCat = useMemo(() => {
        const map = {}; // key: `${type}|${name}` → 12-month array summed across years
        for (const yr of Object.keys(budgetsByYear)) {
          const block = budgetsByYear[yr];
          const addBlock = (rows, type) => {
            for (const r of rows) {
              const k = type + '|' + r.name;
              if (!map[k]) map[k] = new Array(12).fill(0);
              for (let i = 0; i < 12; i++) map[k][i] += (r.months[i] || 0);
            }
          };
          addBlock(block.income,   'Income');
          addBlock(block.expenses, 'Expenses');
          addBlock(block.savings,  'Savings');
        }
        return map;
      }, [budgetsByYear]);

      // groups — budget depends on view
      const budgetForRow = (r) => {
        if (statsView === 'month') return r.months[monthIdx] || 0;
        if (statsView === 'year') return r.months.reduce((a,b)=>a+b, 0);
        // all time: sum that category across every year
        const arr = allTimeBudgetByCat[r.type + '|' + r.name];
        return arr ? arr.reduce((a,b)=>a+b, 0) : 0;
      };
      const groups = [
        { key: 'Income',   label: 'Income',          accent: 'sage',  rows: decoratedRows.filter(r=>r.type==='Income') },
        { key: 'Expenses', label: 'Expenses',        accent: 'terra', rows: decoratedRows.filter(r=>r.type==='Expenses') },
        { key: 'Savings',  label: 'Savings & goals', accent: 'blue',  rows: decoratedRows.filter(r=>r.type==='Savings') }
      ].map(g => {
        // Hide rows that have no activity and no budget in the current view (unless user toggled "show all" for this group).
        const visibleRows = showHiddenFor.has(g.key)
          ? g.rows
          : g.rows.filter(r => (r.actual || 0) > 0 || budgetForRow(r) > 0);
        return {
          ...g,
          rows: [...visibleRows].sort((a,b) => (b.actual || 0) - (a.actual || 0)),
          hiddenCount: g.rows.length - visibleRows.length,
          // Subtotals always include ALL rows so numbers don't change as rows hide/show.
          budget: g.rows.reduce((a,b)=>a+budgetForRow(b),0),
          actual: g.rows.reduce((a,b)=>a+b.actual,0)
        };
      });

      const totals = {
        incB: groups[0].budget, incA: groups[0].actual,
        expB: groups[1].budget, expA: groups[1].actual,
        savB: groups[2].budget, savA: groups[2].actual
      };
      totals.netA = totals.incA - totals.expA;
      totals.netB = totals.incB - totals.expB;
      totals.savingsRate = totals.incA > 0 ? (totals.incA - totals.expA) / totals.incA : 0;
      // Left to allocate: income minus everything planned (expenses + savings goals).
      // Positive = you still have income to assign. Negative = you've over-allocated.
      totals.toAllocateB = totals.incB - totals.expB - totals.savB; // planned basis
      totals.toAllocateA = totals.incA - totals.expA - totals.savA; // actual basis

      // history — per-month totals for the selected year
      const history = useMemo(()=>{
        const inc = Array(12).fill(0), exp = Array(12).fill(0), sav = Array(12).fill(0);
        for (const t of txs) {
          if (!t.date.startsWith(year+'-')) continue;
          const m = parseInt(t.date.slice(5,7)) - 1;
          if (t.type === 'Income') inc[m] += t.amount;
          else if (t.type === 'Expenses') exp[m] += t.amount;
          else if (t.type === 'Savings') sav[m] += t.amount;
        }
        return { inc, exp, sav, net: inc.map((v,i)=>v-exp[i]) };
      }, [txs, year]);

      // yearly history — per-year totals across all data
      const yearlyHistory = useMemo(()=>{
        const m = {};
        for (const t of txs) {
          const y = parseInt(t.date.slice(0,4));
          if (isNaN(y)) continue;
          if (!m[y]) m[y] = { inc:0, exp:0, sav:0 };
          if (t.type === 'Income') m[y].inc += t.amount;
          else if (t.type === 'Expenses') m[y].exp += t.amount;
          else if (t.type === 'Savings') m[y].sav += t.amount;
        }
        return years.map(y => ({ year: y, ...m[y], net: m[y].inc - m[y].exp }));
      }, [txs, years]);

      // edit budget cell — optimistic local update, then persist to Supabase.
      // On failure, reload to recover the truth from the server.
      const editBudget = (key, mIdx, value) => {
        // key looks like "Income-0" / "Expenses-4" / "Savings-2"
        const dash = key.indexOf('-');
        const type = key.slice(0, dash);
        const rowIdx = parseInt(key.slice(dash + 1));
        const blockKey = type === 'Income' ? 'income' : type === 'Savings' ? 'savings' : 'expenses';

        // Capture the category name BEFORE the state update (we need it for the write)
        const yKey = String(year);
        const existingBlock = budgetsByYear[yKey]?.[blockKey] || [];
        const categoryName = existingBlock[rowIdx]?.name
                          || (type === 'Income' ? INCOME_CATS[rowIdx]
                            : type === 'Savings' ? SAVINGS_CATS[rowIdx]
                            : EXPENSE_CATS[rowIdx]);

        setBudgetsByYear(prev => {
          const base = prev[yKey] || {
            income:   INCOME_CATS.map(n  => ({name:n, months:new Array(12).fill(0)})),
            expenses: EXPENSE_CATS.map(n => ({name:n, months:new Array(12).fill(0)})),
            savings:  SAVINGS_CATS.map(n => ({name:n, months:new Array(12).fill(0)}))
          };
          const nextBlock = {
            income:   base.income.map(r   => ({name:r.name, months:r.months.slice()})),
            expenses: base.expenses.map(r => ({name:r.name, months:r.months.slice()})),
            savings:  base.savings.map(r  => ({name:r.name, months:r.months.slice()}))
          };
          if (nextBlock[blockKey][rowIdx]) {
            nextBlock[blockKey][rowIdx].months[mIdx] = value;
          }
          return { ...prev, [yKey]: nextBlock };
        });

        // Persist to Supabase. Month is 1-12 in the DB, mIdx is 0-11.
        if (window.__SupaStore && categoryName) {
          window.__SupaStore.editBudget({
            type, categoryName,
            year: year,
            month: mIdx + 1,
            amount: value
          }).catch(err => {
            console.error('Save failed, reloading:', err);
            alert('Save failed: ' + err.message + '\n\nReloading to restore accurate data.');
            location.reload();
          });
        }
      };
      const addTx = (tx) => {
        // Optimistic insert with temp id, then swap in real UUID once saved
        setTxs(prev => [...prev, tx]);
        // Remember the values for next entry
        setLastUsed({ date: tx.date, type: tx.type, category: tx.category });
        const y = parseInt(tx.date.slice(0,4));
        const m = parseInt(tx.date.slice(5,7)) - 1;
        if (!isNaN(y)) setYear(y);
        if (m >= 0 && m < 12) setMonthIdx(m);
        setView('month');

        if (window.__SupaStore) {
          window.__SupaStore.addTx({
            date: tx.date,
            type: tx.type,
            categoryName: tx.category,
            amount: tx.amount,
            details: tx.details || ''
          }).then(realId => {
            // Swap the temp id for the real UUID so future deletes target the right row
            setTxs(prev => prev.map(t => t.id === tx.id ? { ...t, id: realId } : t));
          }).catch(err => {
            console.error('Add failed, rolling back:', err);
            setTxs(prev => prev.filter(t => t.id !== tx.id));
            alert('Save failed: ' + err.message);
          });
        }
      };
      const updateTx = (tx) => {
        // Optimistic update with rollback on error
        const snapshot = txs.find(t => t.id === tx.id);
        setTxs(prev => prev.map(t => t.id === tx.id
          ? { id: tx.id, date: tx.date, type: tx.type, category: tx.category, amount: tx.amount, details: tx.details || '' }
          : t));
        setLastUsed({ date: tx.date, type: tx.type, category: tx.category });

        if (window.__SupaStore) {
          window.__SupaStore.updateTx({
            id: tx.id,
            date: tx.date,
            type: tx.type,
            categoryName: tx.category,
            amount: tx.amount,
            details: tx.details || ''
          }).catch(err => {
            console.error('Update failed, rolling back:', err);
            if (snapshot) setTxs(prev => prev.map(t => t.id === tx.id ? snapshot : t));
            alert('Save failed: ' + err.message);
          });
        }
      };
      const deleteTx = (id) => {
        // Find the tx so we can show a descriptive message
        const t = txs.find(x => x.id === id);
        const desc = t ? `${t.category} · ${fmt(t.amount)}${t.details ? ' · ' + t.details : ''}` : '';
        setConfirmState({
          title: 'Delete this transaction?',
          message: desc,
          confirmLabel: 'Delete',
          danger: true,
          onConfirm: () => performDeleteTx(id)
        });
      };
      const performDeleteTx = (id) => {
        // Save a snapshot in case we need to roll back
        const snapshot = txs.find(t => t.id === id);
        setTxs(prev => prev.filter(t => t.id !== id));

        if (window.__SupaStore) {
          window.__SupaStore.deleteTx(id).catch(err => {
            console.error('Delete failed, restoring:', err);
            if (snapshot) setTxs(prev => [...prev, snapshot]);
            alert('Delete failed: ' + err.message);
          });
        }
      };

      // ---- Month closeout / celebration ----

      // Look up whether a (year, month) is closed (household-wide).
      const isClosed = (y, mIdx) =>
        closeouts.some(c => c.year === y && c.month === mIdx + 1);

      // Build a celebration summary. Works against an explicit data
      // bundle so it can be called from realtime handlers (where it
      // needs to use the ref) AND from local click handlers.
      const buildSummaryFromRef = (y, mIdx, data) => {
        const { txs, closeouts, budgetsByYear } = data;
        const prefix = y + '-' + String(mIdx+1).padStart(2,'0');
        const monthTxs = txs.filter(t => t.date.startsWith(prefix));
        const inc = monthTxs.filter(t => t.type === 'Income').reduce((a,b)=>a+b.amount, 0);
        const exp = monthTxs.filter(t => t.type === 'Expenses').reduce((a,b)=>a+b.amount, 0);
        const sav = monthTxs.filter(t => t.type === 'Savings').reduce((a,b)=>a+b.amount, 0);
        const leftover = inc - exp - sav;
        const savingsRate = inc > 0 ? (inc - exp) / inc : 0;

        const lastY = mIdx === 0 ? y - 1 : y;
        const lastM = mIdx === 0 ? 11 : mIdx - 1;
        const lastPrefix = lastY + '-' + String(lastM+1).padStart(2,'0');
        const lastTxs = txs.filter(t => t.date.startsWith(lastPrefix));
        const lastNet = lastTxs.filter(t=>t.type==='Income').reduce((a,b)=>a+b.amount, 0)
                      - lastTxs.filter(t=>t.type==='Expenses').reduce((a,b)=>a+b.amount, 0);
        const thisNet = inc - exp;
        const vsLastMonth = lastTxs.length > 0 ? thisNet - lastNet : null;

        const block = budgetsByYear[String(y)];
        let underBudget = 0;
        let totalBudgeted = 0;
        if (block) {
          const allRows = [...block.expenses, ...block.savings];
          for (const row of allRows) {
            const budget = row.months[mIdx] || 0;
            if (budget <= 0) continue;
            totalBudgeted++;
            const actual = monthTxs
              .filter(t => t.category === row.name && (t.type === 'Expenses' || t.type === 'Savings'))
              .reduce((a,b)=>a+b.amount, 0);
            if (actual <= budget) underBudget++;
          }
        }

        // Closeout streak — consecutive closed months ending at (y, mIdx)
        let streak = 1;
        let cy = y, cm = mIdx;
        while (true) {
          if (cm === 0) { cy--; cm = 11; } else { cm--; }
          if (closeouts.some(c => c.year === cy && c.month === cm + 1)) streak++;
          else break;
          if (streak > 60) break;
        }

        return {
          monthName: MONTHS_LONG[mIdx],
          year: y,
          monthIdx: mIdx,
          income: inc,
          expenses: exp,
          savings: sav,
          leftover,
          savingsRate,
          txCount: monthTxs.length,
          vsLastMonth,
          underBudgetCount: underBudget,
          totalBudgetedCount: totalBudgeted,
          perfectMonths: streak
        };
      };

      // Convenience wrapper that uses current React state.
      const buildCelebrationSummary = (y, mIdx) =>
        buildSummaryFromRef(y, mIdx, { txs, closeouts, budgetsByYear });

      const closeOutMonth = (y, mIdx) => {
        if (!window.__SupaStore?.closeMonth) return;
        // Optimistic local insert
        const newCloseout = { year: y, month: mIdx + 1, closed_at: new Date().toISOString() };
        setCloseouts(prev => {
          if (prev.some(c => c.year === y && c.month === mIdx + 1)) return prev;
          return [...prev, newCloseout];
        });
        // Fire the celebration immediately on this session.
        // (The remote session will get its own via the realtime INSERT.)
        setCelebration(buildCelebrationSummary(y, mIdx));
        window.__SupaStore.closeMonth({ year: y, month: mIdx + 1 }).catch(err => {
          console.error('Closeout failed:', err);
          setCloseouts(prev => prev.filter(c => !(c.year === y && c.month === mIdx + 1)));
          alert('Could not save closeout: ' + err.message);
        });
      };

      const reopenMonth = (y, mIdx) => {
        if (!window.__SupaStore?.reopenMonth) return;
        const snapshot = closeouts.find(c => c.year === y && c.month === mIdx + 1);
        setCloseouts(prev => prev.filter(c => !(c.year === y && c.month === mIdx + 1)));
        window.__SupaStore.reopenMonth({ year: y, month: mIdx + 1 }).catch(err => {
          console.error('Reopen failed:', err);
          if (snapshot) setCloseouts(prev => [...prev, snapshot]);
          alert('Could not reopen month: ' + err.message);
        });
      };

      // ---- Closeout photo handlers ----
      // Upload a photo for a closed-out month. Updates the closeout
      // row optimistically so the modal can display it instantly.
      const handleUploadCloseoutPhoto = async ({ year: y, month, blob }) => {
        if (!window.__SupaStore?.uploadCloseoutPhoto) {
          throw new Error('Upload not available');
        }
        const path = await window.__SupaStore.uploadCloseoutPhoto({ year: y, month, blob });
        // Update local closeout state with the new photo_path
        setCloseouts(prev => prev.map(c =>
          (c.year === y && c.month === month) ? { ...c, photo_path: path } : c
        ));
        return path;
      };

      const handleDeleteCloseoutPhoto = async ({ year: y, month, path }) => {
        if (!window.__SupaStore?.deleteCloseoutPhoto) {
          throw new Error('Delete not available');
        }
        await window.__SupaStore.deleteCloseoutPhoto({ year: y, month, path });
        setCloseouts(prev => prev.map(c =>
          (c.year === y && c.month === month) ? { ...c, photo_path: null } : c
        ));
      };

      // Open the celebration modal for a previously-closed month.
      // Used by the year-in-review gallery.
      const openCloseoutFromGallery = (closeout, y, mIdx) => {
        setCelebration(buildCelebrationSummary(y, mIdx));
      };

      // ---- Net worth handlers ----

      // Update an account's balance. Optimistic: update accounts state
      // and add a temporary snapshot row immediately, then persist.
      const handleUpdateBalance = ({ accountId, balance, snapshotDate }) => {
        if (!window.__SupaStore?.updateBalance) return;
        // Optimistic: bump local state
        const tempId = 'temp-' + Date.now();
        setAccounts(prev => prev.map(a =>
          a.id === accountId
            ? { ...a, current_balance: balance, last_updated_at: new Date().toISOString() }
            : a
        ));
        setSnapshots(prev => [...prev, {
          id: tempId,
          account_id: accountId,
          balance: balance,
          snapshot_date: snapshotDate || new Date().toISOString().slice(0, 10),
          recorded_at: new Date().toISOString()
        }]);
        // Persist
        window.__SupaStore.updateBalance({ accountId, balance, snapshotDate })
          .then(realSnap => {
            // Replace the temp snapshot with the real one
            if (realSnap) {
              setSnapshots(prev => prev.map(s => s.id === tempId ? realSnap : s));
            }
          })
          .catch(err => {
            console.error('Balance update failed:', err);
            // Roll back the temp snapshot
            setSnapshots(prev => prev.filter(s => s.id !== tempId));
            alert('Could not save balance update: ' + err.message);
          });
      };

      const handleDeleteSnapshot = ({ snapshotId, accountId }) => {
        if (!window.__SupaStore?.deleteSnapshot) return;
        const removed = snapshots.find(s => s.id === snapshotId);
        // Optimistic: remove it
        setSnapshots(prev => prev.filter(s => s.id !== snapshotId));
        // Recompute account's current balance from remaining snapshots
        const remaining = snapshots.filter(s => s.account_id === accountId && s.id !== snapshotId);
        if (remaining.length > 0) {
          const latest = [...remaining].sort((a,b) => b.snapshot_date.localeCompare(a.snapshot_date))[0];
          setAccounts(prev => prev.map(a =>
            a.id === accountId ? { ...a, current_balance: parseFloat(latest.balance) } : a
          ));
        } else {
          setAccounts(prev => prev.map(a =>
            a.id === accountId ? { ...a, current_balance: 0 } : a
          ));
        }
        window.__SupaStore.deleteSnapshot({ snapshotId, accountId }).catch(err => {
          console.error('Snapshot delete failed:', err);
          if (removed) setSnapshots(prev => [...prev, removed]);
          alert('Could not delete snapshot: ' + err.message);
        });
      };

      // Toggle an account's "excluded" flag. Excluded accounts stay
      // visible in the list (dimmed) but don't count toward the net
      // worth headline or chart. Optimistic update + DB sync.
      const handleSetAccountExcluded = ({ accountId, excluded }) => {
        if (!window.__SupaStore?.setAccountExcluded) return;
        const prev = accounts.find(a => a.id === accountId)?.excluded;
        // Optimistic
        setAccounts(p => p.map(a => a.id === accountId ? { ...a, excluded } : a));
        window.__SupaStore.setAccountExcluded({ accountId, excluded }).catch(err => {
          console.error('Set excluded failed:', err);
          // Roll back
          setAccounts(p => p.map(a => a.id === accountId ? { ...a, excluded: prev } : a));
          alert('Could not update exclusion: ' + err.message);
        });
      };

      // Add a new category. Appended to every year's block (with zero budgets)
      // so it shows up consistently regardless of which year is selected.
      const addCategory = (type, name) => {
        const clean = (name || '').trim();
        if (!clean) return;
        const blockKey = type === 'Income' ? 'income' : type === 'Savings' ? 'savings' : 'expenses';
        // check uniqueness in current year block
        const existing = (budgetsByYear[String(year)]?.[blockKey] || []).some(r => r.name.toLowerCase() === clean.toLowerCase());
        if (existing) { alert('A category named "' + clean + '" already exists in ' + type + '.'); return; }

        // Persist to Supabase first so that subsequent budget edits on this
        // category can resolve its id (they look it up by name).
        const persist = window.__SupaStore
          ? window.__SupaStore.addCategory({ type, name: clean })
          : Promise.resolve();

        persist.then(() => {
          setBudgetsByYear(prev => {
            const next = {};
            const allYears = new Set([...Object.keys(prev), String(year)]);
            for (const y of allYears) {
              const base = prev[y] || {
                income:   INCOME_CATS.map(n  => ({name:n, months:new Array(12).fill(0)})),
                expenses: EXPENSE_CATS.map(n => ({name:n, months:new Array(12).fill(0)})),
                savings:  SAVINGS_CATS.map(n => ({name:n, months:new Array(12).fill(0)}))
              };
              const nextBlock = {
                income:   base.income.map(r   => ({name:r.name, months:r.months.slice()})),
                expenses: base.expenses.map(r => ({name:r.name, months:r.months.slice()})),
                savings:  base.savings.map(r  => ({name:r.name, months:r.months.slice()}))
              };
              // only add if not already present (defensive)
              if (!nextBlock[blockKey].some(r => r.name.toLowerCase() === clean.toLowerCase())) {
                nextBlock[blockKey].push({name: clean, months: new Array(12).fill(0)});
              }
              next[y] = nextBlock;
            }
            return next;
          });
          // Also extend the canonical category list so future seeded years include it.
          if (type === 'Income'   && !INCOME_CATS.includes(clean))  INCOME_CATS.push(clean);
          if (type === 'Expenses' && !EXPENSE_CATS.includes(clean)) EXPENSE_CATS.push(clean);
          if (type === 'Savings'  && !SAVINGS_CATS.includes(clean)) SAVINGS_CATS.push(clean);
        }).catch(err => {
          console.error('Add category failed:', err);
          alert('Could not add category: ' + err.message);
        });
      };

      // filter transactions by current view
      const visibleTxs = useMemo(()=>{
        let out = txs.slice();
        // scope to view unless user picked "All time" explicitly
        if (txFilter.month === 'current') {
          if (view === 'month') {
            const prefix = year + '-' + String(monthIdx+1).padStart(2,'0');
            out = out.filter(t => t.date.startsWith(prefix));
          } else if (view === 'year') {
            out = out.filter(t => t.date.startsWith(year+'-'));
          }
          // view 'all' → no date filter
        }
        if (txFilter.type !== 'all') out = out.filter(t => t.type === txFilter.type);
        if (txFilter.q) {
          const q = txFilter.q.toLowerCase();
          out = out.filter(t =>
            t.category.toLowerCase().includes(q) ||
            (t.details||'').toLowerCase().includes(q));
        }
        out.sort((a,b) => b.date.localeCompare(a.date));
        return out;
      }, [txs, monthIdx, year, view, txFilter]);

      const visible = tab === 'all' ? groups : groups.filter(g => g.key === tab);
      const viewLabel = view === 'month' ? MONTHS_LONG[monthIdx] + ' ' + year
                      : view === 'year'  ? year + ' overview'
                                         : 'All time';
      const currentMonthLabel = viewLabel;
      const monthChange = view === 'month' && monthIdx > 0 ? history.net[monthIdx] - history.net[monthIdx-1] : 0;

      const defaultTxDate = (()=>{
        const today = new Date();
        const ty = today.getFullYear(), tm = today.getMonth();
        if (view === 'month') {
          if (ty === year && tm === monthIdx) return today.toISOString().slice(0,10);
          return year + '-' + String(monthIdx+1).padStart(2,'0') + '-15';
        }
        return today.toISOString().slice(0,10);
      })();

      return (
        <div className="app" data-screen-label="01 Budget">
          <TxModal
            open={modalOpen}
            onClose={() => { setModalOpen(false); setEditingTx(null); setCmdPrefill(null); }}
            onSave={editingTx ? updateTx : addTx}
            categories={categoriesByType}
            defaultDate={cmdPrefill?.date || lastUsed.date || defaultTxDate}
            defaultType={cmdPrefill?.type || lastUsed.type}
            defaultCategory={cmdPrefill?.category || lastUsed.category}
            prefillAmount={cmdPrefill?.amount}
            prefillDetails={cmdPrefill?.details}
            prefillIsRefund={cmdPrefill?.isRefund}
            existingTx={editingTx}
          />
          <FastEntryBar
            open={cmdOpen}
            onClose={() => setCmdOpen(false)}
            onSave={addTx}
            onFallback={(parsed) => {
              setCmdPrefill(parsed);
              setEditingTx(null);
              setModalOpen(true);
            }}
            categoriesByType={categoriesByType}
            txs={txs}
          />
          <ConfirmModal
            open={!!confirmState}
            title={confirmState?.title}
            message={confirmState?.message}
            confirmLabel={confirmState?.confirmLabel}
            danger={confirmState?.danger}
            onConfirm={() => confirmState?.onConfirm()}
            onClose={() => setConfirmState(null)}
          />
          <CelebrationModal
            open={!!celebration}
            summary={celebration}
            closeout={celebration ? closeouts.find(c => c.year === celebration.year && c.month === celebration.monthIdx + 1) : null}
            onUploadPhoto={handleUploadCloseoutPhoto}
            onDeletePhoto={handleDeleteCloseoutPhoto}
            onClose={() => setCelebration(null)}
          />

          {/* Topbar */}
          <div className="topbar">
            <div className="brand">
              <div className="brand-mark" aria-hidden="true">
                <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                  {/* allocation flows out of the bag */}
                  <path d="M20 18 Q12 14 6 8"  stroke="var(--sage)"       strokeWidth="1.5" strokeLinecap="round" strokeDasharray="2 2"/>
                  <path d="M20 18 Q20 10 20 4"  stroke="var(--blue)"       strokeWidth="1.5" strokeLinecap="round" strokeDasharray="2 2"/>
                  <path d="M20 18 Q28 14 34 8"  stroke="var(--amber)"      strokeWidth="1.5" strokeLinecap="round" strokeDasharray="2 2"/>
                  {/* destination dots */}
                  <circle cx="6" cy="8"  r="2" fill="var(--sage)"/>
                  <circle cx="20" cy="4" r="2" fill="var(--blue)"/>
                  <circle cx="34" cy="8" r="2" fill="var(--amber)"/>
                  {/* bag tie */}
                  <path d="M15 15 L17 12 L23 12 L25 15 Z" fill="var(--ink-2)"/>
                  {/* bag body */}
                  <path d="M14 16 Q12 18 12 24 Q12 34 20 36 Q28 34 28 24 Q28 18 26 16 Z"
                        fill="var(--terracotta)" stroke="var(--ink)" strokeWidth="0.8" strokeLinejoin="round"/>
                  {/* dollar sign */}
                  <text x="20" y="29" textAnchor="middle"
                        fontFamily="'Fraunces', serif" fontSize="11" fontWeight="600" fill="#fff">$</text>
                </svg>
              </div>
              <div>
                <h1 className="serif">The Clements Fam Budget</h1>
                <div className="sub">
                  {txs.length.toLocaleString()} transactions
                  <LastEditedBy />
                </div>
              </div>
            </div>

            <div className="view-switch">
              <div className="seg">
                <button className={view==='month'?'on':''} onClick={()=>setView('month')}>Month</button>
                <button className={view==='year'?'on':''} onClick={()=>setView('year')}>Year</button>
                <button className={view==='all'?'on':''} onClick={()=>setView('all')}>All time</button>
                <button className={view==='flow'?'on':''} onClick={()=>setView('flow')}>Flow</button>
                <button className={view==='networth'?'on':''} onClick={()=>setView('networth')}>Net Worth</button>
                <button className={view==='review'?'on':''} onClick={()=>setView('review')}>Recap</button>
              </div>
              {/* Combined month + year picker. Shows "May 2026" on Month
                  view, "2026" on Year view; opens a popover with both
                  selectors. Replaces two separate dropdowns to reduce
                  topbar clutter. */}
              <PeriodChip
                view={view}
                monthIdx={monthIdx}
                year={year}
                setMonthIdx={setMonthIdx}
                setYear={setYear}
                years={years}
              />
            </div>

            <div className="actions">
              {view === 'month' && (
                isClosed(year, monthIdx) ? (
                  <button className="btn"
                    title="Month is closed — click to reopen"
                    onClick={() => {
                      setConfirmState({
                        title: `Reopen ${MONTHS_LONG[monthIdx]} ${year}?`,
                        message: 'You can close it out again later.',
                        confirmLabel: 'Reopen',
                        onConfirm: () => reopenMonth(year, monthIdx)
                      });
                    }}>
                    <span style={{fontSize:14}}>🔒</span>
                    Closed
                  </button>
                ) : (
                  <button className="btn"
                    title={`Close out ${MONTHS_LONG[monthIdx]} ${year}`}
                    onClick={() => closeOutMonth(year, monthIdx)}>
                    <span style={{fontSize:14}}>🎯</span>
                    Close out {MONTHS[monthIdx]}
                  </button>
                )
              )}
              <button className="btn" onClick={()=>setTweaksOpen(v=>!v)}>Theme</button>
              <button className="btn btn-primary" onClick={()=>setModalOpen(true)}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add transaction
              </button>
            </div>
          </div>

          {/* Personalized greeting line with time-of-day emoji */}
          <GreetingLine />

          {/* Mobile-only month/year picker. Hidden on desktop via CSS
              since the topbar has its own pickers. Only renders content
              for views where it makes sense (Month and Year). */}
          <div className="mobile-only">
            <MobilePeriodPicker
              view={view}
              monthIdx={monthIdx}
              year={year}
              setMonthIdx={setMonthIdx}
              setYear={setYear}
              years={years}
            />
          </div>

          {/* Hero — cash flow stats. Hidden in networth and review views
              since those pages are about balance/history, not flow. */}
          {view !== 'networth' && view !== 'review' && (
          <div className="hero">
            <div className="card feature">
              <div>
                <div className="stat-label">{statsView === 'month' ? 'Net this month' : statsView === 'year' ? 'Net '+year : 'Net · all time'}</div>
                <div className="stat-val serif">{fmt(totals.netA)}</div>
                <div className="stat-sub">
                  {statsView === 'month' && monthIdx > 0 && <span className={"pill " + (monthChange>=0?'up':'down')}>
                    {monthChange>=0?'▲':'▼'} {fmtSigned(monthChange)} vs {MONTHS[monthIdx-1]}
                  </span>}
                  <span style={{marginLeft: statsView==='month' && monthIdx > 0 ? 8 : 0, color:'var(--ink-3)'}}>planned {fmt(totals.netB)}</span>
                </div>
              </div>
              <Spark data={statsView==='month' ? history.net.slice(0, monthIdx+1) : statsView==='year' ? history.net : yearlyHistory.map(y=>y.net)} color="var(--sage)"/>
            </div>

            <div className="card">
              <div className="stat-label">Income</div>
              <div className="stat-val serif small">{fmt(totals.incA)}</div>
              <div className="stat-sub" style={{color:'var(--ink-3)'}}>of {fmt(totals.incB)} planned</div>
              <div style={{marginTop:12}}><Bar value={totals.incA} budget={totals.incB} accent="sage" rowType="Income"/></div>
            </div>

            <div className="card">
              <div className="stat-label">Spent</div>
              <div className="stat-val serif small">{fmt(totals.expA)}</div>
              <div className="stat-sub" style={{color:'var(--ink-3)'}}>of {fmt(totals.expB)} budgeted</div>
              <div style={{marginTop:12}}><Bar value={totals.expA} budget={totals.expB} accent="terra" rowType="Expenses"/></div>
            </div>

            <div className="card">
              <div className="stat-label">Savings rate</div>
              <div className="donut-wrap" style={{marginTop:4}}>
                {/*
                  Three possible visualizations:

                  1. Positive rate (saved > 0): standard blue arc clockwise
                     showing the saved portion of income.
                  2. Negative rate (overspent): terracotta arc counter-
                     clockwise showing magnitude of overspending.
                  3. Zero income, non-zero spending: same as negative
                     (essentially "infinite" overspending).

                  "Saved" here = income - expenses. This already accounts
                  for savings contributions because they came out of
                  checking but aren't in `expA`, so the net flow captures
                  intentional saves (Roth, etc.) implicitly.
                */}
                {(() => {
                  const saved = totals.incA - totals.expA;
                  const rate = totals.savingsRate;  // already computed: (inc - exp) / inc
                  const isNegative = saved < 0 || (totals.incA <= 0 && totals.expA > 0);
                  if (isNegative) {
                    // Magnitude of overshoot, used to size the red arc
                    const overMagnitude = totals.incA > 0
                      ? Math.abs(saved) / totals.incA
                      : 1; // no income, fully red
                    return (
                      <Donut
                        slices={[{ value: overMagnitude }]}
                        negative={true}
                        percentLabel={totals.incA > 0 ? `${Math.round(rate*100)}%` : '—'}
                        captionLabel="OVER"
                      />
                    );
                  }
                  return (
                    <Donut slices={[
                      { value: Math.max(0, saved), color: 'var(--blue)' },
                      { value: Math.max(0, totals.expA), color: 'var(--line)' }
                    ]}/>
                  );
                })()}
                <div className="legend">
                  <div className="legend-row">
                    <span className="legend-dot" style={{background:'var(--blue)'}}/>
                    <span>
                      Saved <strong className="num" style={{
                        color: (totals.incA - totals.expA) < 0 ? 'var(--terra-ink)' : undefined
                      }}>
                        {(totals.incA - totals.expA) < 0 ? '−' : ''}{fmt(Math.abs(totals.incA - totals.expA))}
                      </strong>
                    </span>
                  </div>
                  {totals.savA > 0 && (
                    <div className="legend-row" style={{paddingLeft: 14, fontSize: 11, opacity: 0.85}}>
                      <span style={{color: 'var(--ink-3)', fontStyle: 'italic'}}>
                        incl. <strong className="num">{fmt(totals.savA)}</strong> to savings
                      </span>
                    </div>
                  )}
                  <div className="legend-row"><span className="legend-dot" style={{background:'var(--terracotta)'}}/><span>Spent <strong className="num">{fmt(totals.expA)}</strong></span></div>
                  <div className="legend-row"><span className="legend-dot" style={{background:'var(--sage)'}}/><span>Income <strong className="num">{fmt(totals.incA)}</strong></span></div>
                </div>
              </div>
            </div>
          </div>
          )}

          {/* Allocation strip + category tabs — these belong to the budget
              table view, so we hide them on the Flow tab. */}
          {view !== 'flow' && view !== 'networth' && view !== 'review' && (
            <>
              <AllocationStrip totals={totals} view={statsView} year={year} monthName={MONTHS[monthIdx]}/>
              <div className="tabs">
                {[{k:'all',l:'All categories'},{k:'Income',l:'Income'},{k:'Expenses',l:'Expenses'},{k:'Savings',l:'Savings'}].map(t => (
                  <button key={t.k} className={"tab " + (tab===t.k?'active':'')} onClick={()=>setTab(t.k)}>{t.l}</button>
                ))}
              </div>
            </>
          )}

          {/* Flow view (Sankey) renders separately from the standard grid */}
          {view === 'flow' ? (
            <FlowView
              txs={txs}
              monthIdx={monthIdx}
              year={year}
              setMonthIdx={setMonthIdx}
              setYear={setYear}
              years={years}
              period={flowPeriod}
              setPeriod={setFlowPeriod}
              fmt={fmt}
            />
          ) : view === 'networth' ? (
            <NetWorthView
              accounts={accounts}
              snapshots={snapshots}
              onUpdateBalance={handleUpdateBalance}
              onDeleteSnapshot={handleDeleteSnapshot}
              onSetExcluded={handleSetAccountExcluded}
            />
          ) : view === 'review' ? (
            <YearInReviewView
              closeouts={closeouts}
              txs={txs}
              year={year}
              setYear={setYear}
              years={years}
              onOpenCloseout={openCloseoutFromGallery}
            />
          ) : (
          <div className="main-grid">
            <div style={{display:'flex', flexDirection:'column', gap:18}}>
              {/* Categories table */}
              <div className="table-card">
                <div className="table-head">
                  <h2 className="serif">Categories · {viewLabel}</h2>
                  <div style={{fontSize:12, color:'var(--ink-3)', display:'flex', gap:14, alignItems:'center'}}>
                    <span>click any budget value to edit</span>
                  </div>
                </div>
                <table>
                  <thead>
                    <tr>
                      <th>Category</th>
                      <th className="num">Budget</th>
                      <th className="num">Actual</th>
                      <th className="num">Remaining</th>
                      <th>Progress</th>
                    </tr>
                  </thead>
                  <tbody>
                    {visible.map(g => (
                      <React.Fragment key={g.key}>
                        <GroupHeader label={g.label}
                          right={<span className="num" style={{color:'var(--ink-2)'}}>{fmt(g.actual)} / {fmt(g.budget)}</span>}/>
                        {g.rows.map(r => <Row key={r.key} row={r} monthIdx={monthIdx} view={view} budget={budgetForRow(r)} onEdit={editBudget}/>)}
                        {!showHiddenFor.has(g.key) && g.hiddenCount > 0 && (
                          <tr className="hidden-hint">
                            <td colSpan="5" style={{padding:'8px 14px 8px 56px', color:'var(--ink-3)', fontSize:12, fontStyle:'italic'}}>
                              {g.hiddenCount} {g.key.toLowerCase()} categor{g.hiddenCount===1?'y':'ies'} hidden (no activity or budget this {view === 'month' ? 'month' : view === 'year' ? 'year' : 'period'}).{' '}
                              <button className="link-btn" onClick={()=>toggleShownFor(g.key)}>Show all</button>
                            </td>
                          </tr>
                        )}
                        {showHiddenFor.has(g.key) && (
                          <tr className="hidden-hint">
                            <td colSpan="5" style={{padding:'8px 14px 8px 56px', color:'var(--ink-3)', fontSize:12, fontStyle:'italic'}}>
                              Showing all {g.key.toLowerCase()} categories.{' '}
                              <button className="link-btn" onClick={()=>toggleShownFor(g.key)}>Hide unused</button>
                            </td>
                          </tr>
                        )}
                        {addingTo === g.key ? (
                          <tr className="add-cat-row">
                            <td colSpan="5" style={{padding:'10px 14px 10px 56px'}}>
                              <div style={{display:'flex', gap:8, alignItems:'center'}}>
                                <input
                                  autoFocus
                                  type="text"
                                  placeholder={'New ' + g.key.toLowerCase() + ' category name'}
                                  value={newCatName}
                                  onChange={e=>setNewCatName(e.target.value)}
                                  onKeyDown={e => {
                                    if (e.key === 'Enter') { addCategory(g.key, newCatName); setAddingTo(null); setNewCatName(''); }
                                    if (e.key === 'Escape') { setAddingTo(null); setNewCatName(''); }
                                  }}
                                  style={{flex:1, padding:'7px 10px', border:'1px solid var(--line)', borderRadius:7, background:'var(--bg)', font:'inherit', color:'inherit'}}
                                />
                                <button className="btn btn-primary" style={{padding:'6px 12px'}}
                                  onClick={()=>{ addCategory(g.key, newCatName); setAddingTo(null); setNewCatName(''); }}>
                                  Add
                                </button>
                                <button className="btn" style={{padding:'6px 12px'}}
                                  onClick={()=>{ setAddingTo(null); setNewCatName(''); }}>
                                  Cancel
                                </button>
                              </div>
                            </td>
                          </tr>
                        ) : (
                          <tr className="add-cat-row">
                            <td colSpan="5" style={{padding:'6px 14px 6px 56px'}}>
                              <button className="link-btn" onClick={()=>{ setAddingTo(g.key); setNewCatName(''); }}>
                                + Add {g.key.toLowerCase().replace(/s$/,'')} category
                              </button>
                            </td>
                          </tr>
                        )}
                        <SubtotalRow label={g.label} budget={g.budget} actual={g.actual} accent={g.accent} kind={g.key}/>
                      </React.Fragment>
                    ))}
                  </tbody>
                </table>

                {/* Mobile category cards — rendered alongside the table.
                    CSS shows one or the other based on viewport. Mobile
                    version is intentionally simpler: just visible
                    categories with budget/actual numbers and a mini
                    progress bar. Editing budgets requires desktop or
                    tablet — a deliberate choice to keep the mobile UI
                    focused on logging transactions, not editing budgets. */}
                <div className="cat-cards">
                  {visible.map(g => (
                    <React.Fragment key={'mc-' + g.key}>
                      <div style={{
                        padding: '10px 14px', background: 'var(--bg-soft)',
                        fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.06em',
                        color: 'var(--ink-3)', fontWeight: 600,
                        display: 'flex', justifyContent: 'space-between'
                      }}>
                        <span>{g.label}</span>
                        <span className="num" style={{color: 'var(--ink-2)'}}>
                          {fmt(g.actual)} / {fmt(g.budget)}
                        </span>
                      </div>
                      {g.rows.map(r => {
                        const acc = ACCENTS[r.color];
                        const rowBudget = budgetForRow(r);
                        const pct = rowBudget > 0 ? Math.min(100, (r.actual / rowBudget) * 100) : 0;
                        const isEmoji = isEmojiGlyph(r.glyph);
                        return (
                          <div key={'mc-' + r.key} className="cat-card">
                            <span
                              className={'glyph' + (isEmoji ? '' : ' with-bg')}
                              style={isEmoji ? undefined : {background: acc.bg, color: acc.fg}}
                            >{r.glyph}</span>
                            <div className="body">
                              <div className="name">{r.name}</div>
                              <div className="sub-row">
                                <span className="actual">{fmt(r.actual || 0)}</span>
                                <span className="budget">/ {fmt(rowBudget)}</span>
                              </div>
                            </div>
                            <div className="mini-bar" aria-hidden="true">
                              <div className="fill" style={{
                                width: pct + '%',
                                background: pct > 100 ? 'var(--terracotta)' : acc.bg
                              }}/>
                            </div>
                          </div>
                        );
                      })}
                    </React.Fragment>
                  ))}
                </div>
              </div>

              {/* Transactions */}
              <div className="table-card">
                <div className="table-head">
                  <h2 className="serif">Transactions</h2>
                  <button className="btn btn-primary" style={{padding:'6px 12px'}} onClick={()=>setModalOpen(true)}>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add
                  </button>
                </div>
                <div className="tx-filter">
                  <input placeholder="Search category or details…" value={txFilter.q}
                    onChange={e=>setTxFilter({...txFilter, q: e.target.value})} style={{flex:1}}/>
                  <select value={txFilter.type} onChange={e=>setTxFilter({...txFilter, type: e.target.value})}>
                    <option value="all">All types</option>
                    <option value="Income">Income</option>
                    <option value="Expenses">Expenses</option>
                    <option value="Savings">Savings</option>
                  </select>
                  <select value={txFilter.month} onChange={e=>setTxFilter({...txFilter, month: e.target.value})}>
                    <option value="current">{view==='month' ? 'This month' : view==='year' ? 'This year' : 'All time'}</option>
                    <option value="all">All time</option>
                  </select>
                </div>
                <div className="tx-list">
                  {visibleTxs.length === 0 && (
                    <div style={{padding:'40px 20px', textAlign:'center', color:'var(--ink-3)', fontSize:13}}>
                      No transactions match. Try "All time" or <button className="btn" style={{padding:'4px 10px', marginLeft:6}} onClick={()=>setModalOpen(true)}>add one</button>
                    </div>
                  )}
                  {visibleTxs.slice(0, txLimit).map(t => (
                    <div key={t.id} className={"tx-row" + (String(t.id).startsWith('t') ? ' tx-new' : '')}
                      onClick={() => { setEditingTx(t); setModalOpen(true); }}
                      style={{cursor:'pointer'}}
                      title="Click to edit">
                      <span className="tx-date num">{t.date.slice(5)}</span>
                      <span className={"tx-type " + (t.type==='Income'?'income':t.type==='Expenses'?'expense':'')}
                        style={t.type==='Savings'?{background:'var(--blue-soft)',color:'var(--blue-ink)'}:undefined}>
                        {t.type}
                      </span>
                      <span style={{fontWeight:500, display:'inline-flex', alignItems:'center', gap:6}}>
                        <span className="tx-cat-emoji" aria-hidden="true">{glyphFor(t.category)}</span>
                        <span>{t.category}</span>
                      </span>
                      <span className="tx-details">{t.details || '—'}</span>
                      <span className={"tx-amount num " + (((t.type === 'Income') !== (t.amount < 0)) ? 'income' : 'expense')}>
                        {/* Determine sign prefix based on the *effective*
                            direction of money flow, not just the type:
                            - Income (positive) shows +
                            - Expense (positive) shows −
                            - Expense (negative = refund) shows + (money in)
                            This way refunds visually read as money coming
                            back to you, which matches reality. */}
                        {((t.type === 'Income') !== (t.amount < 0)) ? '+' : '−'}{fmtCents(Math.abs(t.amount))}
                      </span>
                      <button className="delete-btn"
                        onClick={(e) => { e.stopPropagation(); deleteTx(t.id); }}
                        style={{opacity:0.6}} title="Delete">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
                      </button>
                    </div>
                  ))}
                  {visibleTxs.length > txLimit && (
                    <div style={{padding:'10px 18px', textAlign:'center', color:'var(--ink-3)', fontSize:12, borderTop:'1px solid var(--line)', display:'flex', gap:10, justifyContent:'center', alignItems:'center'}}>
                      <span>Showing {txLimit} of {visibleTxs.length}</span>
                      <button className="link-btn" onClick={()=>setTxLimit(n => n + 200)}>Load 200 more</button>
                      <button className="link-btn" onClick={()=>setTxLimit(visibleTxs.length)}>Show all</button>
                    </div>
                  )}
                </div>
              </div>

              {/* Fun fact — rotates through 40+ insights, click the
                   refresh icon to cycle to another one */}
              <FactCard txs={txs}/>
            </div>

            {/* Side panel */}
            <div className="side">
              <div className="card">
                <h3 className="serif">
                  {view === 'all' ? 'Yearly trend' : view === 'year' ? year + ' monthly trend' : year + ' trend'}
                </h3>
                {view === 'all' ? (
                  <React.Fragment>
                    <div className="mini-stat">
                      <div className="mini-stat-head"><span className="name">Income</span><span className="vals num">{fmt(totals.incA)}</span></div>
                      <Spark data={yearlyHistory.map(y=>y.inc)} color="var(--sage)"/>
                    </div>
                    <div className="mini-stat">
                      <div className="mini-stat-head"><span className="name">Expenses</span><span className="vals num">{fmt(totals.expA)}</span></div>
                      <Spark data={yearlyHistory.map(y=>y.exp)} color="var(--terracotta)"/>
                    </div>
                    <div className="mini-stat">
                      <div className="mini-stat-head"><span className="name">Savings</span><span className="vals num">{fmt(totals.savA)}</span></div>
                      <Spark data={yearlyHistory.map(y=>y.sav)} color="var(--blue)"/>
                    </div>
                    <div style={{display:'flex', justifyContent:'space-between', fontSize:11, color:'var(--ink-3)', marginTop:6, padding:'0 4px'}}>
                      {yearlyHistory.map(y => <span key={y.year} className="num">{y.year}</span>)}
                    </div>
                  </React.Fragment>
                ) : (
                  <React.Fragment>
                    <div className="mini-stat">
                      <div className="mini-stat-head"><span className="name">Income</span><span className="vals num">{fmt(view==='year' ? history.inc.reduce((a,b)=>a+b,0) : history.inc[monthIdx])}</span></div>
                      <Spark data={view==='year' ? history.inc : history.inc.slice(0, monthIdx+1)} color="var(--sage)"/>
                    </div>
                    <div className="mini-stat">
                      <div className="mini-stat-head"><span className="name">Expenses</span><span className="vals num">{fmt(view==='year' ? history.exp.reduce((a,b)=>a+b,0) : history.exp[monthIdx])}</span></div>
                      <Spark data={view==='year' ? history.exp : history.exp.slice(0, monthIdx+1)} color="var(--terracotta)"/>
                    </div>
                    <div className="mini-stat">
                      <div className="mini-stat-head"><span className="name">Savings</span><span className="vals num">{fmt(view==='year' ? history.sav.reduce((a,b)=>a+b,0) : history.sav[monthIdx])}</span></div>
                      <Spark data={view==='year' ? history.sav : history.sav.slice(0, monthIdx+1)} color="var(--blue)"/>
                    </div>
                  </React.Fragment>
                )}
              </div>

              <div className="card">
                <h3 className="serif">Insights</h3>
                {(() => {
                  const items = [];
                  // over-budget category
                  const over = decoratedRows.filter(r => r.type === 'Expenses' && budgetForRow(r) > 0 && r.actual > budgetForRow(r))
                    .sort((a,b) => (b.actual-budgetForRow(b)) - (a.actual-budgetForRow(a)))[0];
                  if (over) items.push(
                    <div className="insight" key="over">
                      <span className="insight-icon" style={{background:'var(--terra-soft)', color:'var(--terra-ink)'}}>!</span>
                      <div><strong>{over.name}</strong> is over budget — {fmt(over.actual)} of {fmt(budgetForRow(over))}.</div>
                    </div>);
                  // net delta (month view only)
                  if (view === 'month' && monthIdx > 0 && monthChange > 0) items.push(
                    <div className="insight" key="net">
                      <span className="insight-icon" style={{background:'var(--sage-soft)', color:'var(--sage-ink)'}}>↑</span>
                      <div><strong>Net up {fmt(monthChange)}</strong> vs {MONTHS[monthIdx-1]} — keep it going.</div>
                    </div>);
                  // best year (all-time view)
                  if (view === 'all' && yearlyHistory.length > 1) {
                    const bestYr = [...yearlyHistory].sort((a,b)=>b.net-a.net)[0];
                    items.push(
                      <div className="insight" key="best">
                        <span className="insight-icon" style={{background:'var(--amber-soft)', color:'var(--amber-ink)'}}>✓</span>
                        <div>Best net year: <strong>{bestYr.year}</strong> at {fmt(bestYr.net)}.</div>
                      </div>);
                  }
                  if (totals.savingsRate > 0) items.push(
                    <div className="insight" key="sr">
                      <span className="insight-icon" style={{background:'var(--blue-soft)', color:'var(--blue-ink)'}}>★</span>
                      <div><strong>Savings rate {Math.round(totals.savingsRate*100)}%</strong> of {view==='month'?MONTHS[monthIdx]:view==='year'?year:'all-time'} income.</div>
                    </div>);
                  if (items.length === 0) items.push(
                    <div className="insight" key="empty">
                      <span className="insight-icon" style={{background:'var(--bg-elev)', color:'var(--ink-3)'}}>·</span>
                      <div>No activity recorded for {viewLabel} yet. <button className="btn" style={{padding:'3px 8px', marginLeft:4}} onClick={()=>setModalOpen(true)}>Add one</button></div>
                    </div>);
                  return items;
                })()}
              </div>

              <div className="card">
                <h3 className="serif">Top spending</h3>
                <div style={{display:'flex', flexDirection:'column', gap:10, marginTop:4}}>
                  {decoratedRows.filter(r=>r.type==='Expenses' && r.actual > 0)
                    .sort((a,b)=>b.actual-a.actual).slice(0,5).map(r => (
                      <div key={r.key}>
                        <div style={{display:'flex', justifyContent:'space-between', fontSize:13, marginBottom:4}}>
                          <span style={{fontWeight:500}}>{r.name}</span>
                          <span className="num" style={{color:'var(--ink-3)'}}>{fmt(r.actual)}</span>
                        </div>
                        <Bar value={r.actual} budget={budgetForRow(r)||r.actual} accent={r.color} rowType={r.type}/>
                      </div>
                    ))}
                  {decoratedRows.filter(r=>r.type==='Expenses' && r.actual > 0).length === 0 && (
                    <div style={{color:'var(--ink-3)', fontSize:13}}>No spending logged for {viewLabel}.</div>
                  )}
                </div>
              </div>
            </div>
          </div>
          )}

          {/* Tweaks */}
          <div className={"tweaks-panel " + (tweaksOpen?'open':'')}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: 8}}>
              <h4 className="serif">Tweaks</h4>
              <button onClick={()=>setTweaksOpen(false)} style={{color:'var(--ink-3)', fontSize:18}}>×</button>
            </div>
            <div className="tweak-row">
              <label>Theme</label>
              <div className="swatches">
                {[
                  {k:'warm', c:'linear-gradient(135deg,#faf7f2,#f2ede4)'},
                  {k:'cool', c:'linear-gradient(135deg,#f4f7fa,#e9eef4)'},
                  {k:'sage', c:'linear-gradient(135deg,#f4f6f2,#e8ece2)'},
                  {k:'dark', c:'linear-gradient(135deg,#24221e,#1a1916)'}
                ].map(s => (
                  <div key={s.k} className={"swatch " + (tweaks.theme===s.k?'active':'')}
                    style={{background: s.c}}
                    onClick={()=>setTweak('theme', s.k)}/>
                ))}
              </div>
            </div>
          </div>

          {/* Mobile bottom tab bar — view switcher for phones. CSS hides
              on desktop. Renders alongside the desktop topbar so the
              same view state drives both. */}
          <MobileTabBar view={view} setView={setView} currentYear={year} />

          {/* Floating action button — quick access to Add Transaction
              on mobile. CSS hides on desktop. Lives above the tab bar. */}
          <button
            className="fab"
            onClick={() => setModalOpen(true)}
            aria-label="Add transaction"
            title="Add transaction"
          >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  
})();
</script>
  <!-- Bootstrap: authenticates user, loads data from Supabase,
       then activates the deferred React/Babel scripts above. -->
  <script src="supabase-client.js"></script>

  <!-- PWA: register the service worker so the app is installable.
       Only runs when served over https (so skipped during file:// local
       dev, and active only on the Vercel deployment). -->
  <script>
    if ('serviceWorker' in navigator && location.protocol === 'https:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(err => {
          console.warn('Service worker registration failed:', err);
        });
      });
    }
  </script>

</body>
</html>
